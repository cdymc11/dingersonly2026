// Save a weekly snapshot - called automatically on Mondays & manually by commish
async function saveHistorySnapshot(label) {
  try {
    const now = new Date();
    const weekLabel = label || `Week of ${now.toLocaleDateString("en-US",{month:"short",day:"numeric"})}`;
    const docId = now.toISOString().split("T")[0]; // YYYY-MM-DD as doc ID
    const snapshot = S.teams.map(t => ({
      id: t.id,
      name: t.name,
      owner: t.owner || "",
      score: score(t),
    })).sort((a,b) => b.score - a.score);
    await setDoc(doc(db,"history",docId), { label: weekLabel, date: docId, standings: snapshot });
    return true;
  } catch(e) {
    console.error("History save failed:", e);
    return false;
  }
}

// Load all history snapshots from Firebase
async function loadHistory() {
  set({historyLoading: true});
  try {
    const q = query(historyCol, orderBy("date","asc"));
    const snap = await getDocs(q);
    const weeks = snap.docs.map(d => d.data());
    set({historyWeeks: weeks, historyLoading: false, historyWeekIdx: weeks.length - 1});
  } catch(e) {
    set({historyWeeks: [], historyLoading: false});
  }
}

// Auto-snapshot every Monday - checks once on load
function maybeAutoSnapshot() {
  const now = new Date();
  if(now.getDay() !== 1) return; // only on Monday
  const todayStr = now.toISOString().split("T")[0];
  const lastSnap = localStorage.getItem("lastHistorySnap");
  if(lastSnap === todayStr) return; // already snapped today
  // Wait until stats are loaded (give it 5s after firebase sync)
  setTimeout(async () => {
    if(S.teams && S.teams.some(t => score(t) > 0)) {
      const ok = await saveHistorySnapshot();
      if(ok) localStorage.setItem("lastHistorySnap", todayStr);
    }
  }, 5000);
}

async function fetchStats(name) {
  try {
    let playerId = PLAYER_IDS[name] || null;
    if (!playerId) {
      const r = await fetch(`https://statsapi.mlb.com/api/v1/people/search?names=${encodeURIComponent(name)}&sportId=1`);
      if (!r.ok) return null;
      const d = await r.json();
      const person = d.people?.[0]; if(!person) return null;
      playerId = person.id;
    }
    const season = new Date().getFullYear();
    // Fetch stats and current team info in parallel
    const [r2, r3] = await Promise.all([
      fetch(`https://statsapi.mlb.com/api/v1/people/${playerId}/stats?stats=season&group=hitting&season=${season}&sportId=1`),
      fetch(`https://statsapi.mlb.com/api/v1/people/${playerId}`)
    ]);
    if (!r2.ok) return { hr: 0, hbp: 0, playerId, teamAbbr: null };
    const d2 = await r2.json();
    const split = d2.stats?.[0]?.splits?.[0];
    // Get team abbr: prefer stats split, fall back to currentTeam via ID lookup
    let teamAbbr = split?.team?.abbreviation ?? null;
    if (!teamAbbr && r3.ok) {
      const d3 = await r3.json();
      const teamId = d3.people?.[0]?.currentTeam?.id ?? null;
      if (teamId) teamAbbr = MLB_TEAM_ABBR[teamId] ?? null;
    }
    return { hr: split?.stat?.homeRuns??0, hbp: split?.stat?.hitByPitch??0, playerId, teamAbbr };
  } catch { return null; }
}

async function fetchYesterday(playerId) {
  try {
    const y = new Date(); y.setDate(y.getDate()-1);
    const ds = y.toISOString().split("T")[0];
    const season = new Date().getFullYear();
    const r = await fetch(`https://statsapi.mlb.com/api/v1/people/${playerId}/stats?stats=gameLog&group=hitting&season=${season}&startDate=${ds}&endDate=${ds}&sportId=1`);
    const d = await r.json();
    const stat = d.stats?.[0]?.splits?.[0]?.stat; if(!stat) return null;
    return { hr: stat.homeRuns??0, hbp: stat.hitByPitch??0 };
  } catch { return null; }
}

// Correct known misspellings from old Firebase data
const NAME_CORRECTIONS = {
  "Joe Adell": "Jo Adell",
  "Caleb Durin": "Caleb Durbin",
};

// Listen to Firebase for real-time updates
// We always use HARDCODED_TEAMS for names/structure, but merge saved stats on top
onSnapshot(leagueRef, snap => {
  if(snap.exists()) {
    const data = snap.data();
    if(data.teams?.length > 0) {
      // Build a lookup of saved player stats keyed by player ID or position
      const merged = JSON.parse(JSON.stringify(HARDCODED_TEAMS));
      merged.forEach(team => {
        const saved = data.teams.find(t => t.id === team.id);
        if(!saved) return;
        // Copy transaction/stat fields from saved team
        team.hasUsedTransaction = saved.hasUsedTransaction || false;
        // Match players by index (same draft order), copy stats over
        team.players.forEach((p, i) => {
          const sp = saved.players?.[i];
          if(!sp) return;
          if(p.type === "hr") {
            p.effectiveHR = sp.effectiveHR || 0;
            p.hrBaseline = sp.hrBaseline ?? null;
            p.droppedAt = sp.droppedAt || null;
            p.addedAt = sp.addedAt || null;
          }
          if(p.type === "hbp") {
            p.effectiveHBP = sp.effectiveHBP || 0;
            p.hbpBaseline = sp.hbpBaseline ?? null;
            p.droppedAt = sp.droppedAt || null;
            p.addedAt = sp.addedAt || null;
          }
        });
        // Also append any added (transaction) players beyond the base 8
        if(saved.players?.length > team.players.length) {
          const extra = saved.players.slice(team.players.length);
          extra.forEach(ep => {
            ep.name = NAME_CORRECTIONS[ep.name] || ep.name;
            team.players.push(ep);
          });
        }
      });
      set({ teams: merged, lastUpdated: data.lastUpdated||null });
      maybeAutoSnapshot();
    }
  }
});

async function saveToFirebase(teams) {
  const now = new Date().toISOString();
  // Always enforce hardcoded team names before saving
  const corrected = teams.map(t => {
    const hc = HARDCODED_TEAMS.find(h => h.id === t.id);
    return hc ? { ...t, name: hc.name, owner: hc.owner } : t;
  });
  await setDoc(leagueRef, { teams: corrected, lastUpdated: now });

// ── MLB Stats refresh ─────────────────────────────────────────────────────────
async function refreshAllStats() {
  set({ refreshing: true, refreshStatus: "Fetching stats..." });
  const updated = JSON.parse(JSON.stringify(S.teams));
  for(const t of updated) {
    for(const p of t.players) {
      if(!p.name?.trim()) continue;
      const s = await fetchStats(p.name); if(!s) continue;
      if(p.type==="hr" && !p.droppedAt) {
        if(p.addedAt){ if(p.hrBaseline===null) p.hrBaseline=s.hr; p.effectiveHR=Math.max(0,s.hr-p.hrBaseline); }
        else p.effectiveHR=s.hr;
      }
      if(p.type==="hbp" && !p.droppedAt) {
        if(p.addedAt){ if(p.hbpBaseline===null) p.hbpBaseline=s.hbp; p.effectiveHBP=Math.max(0,s.hbp-p.hbpBaseline); }
        else p.effectiveHBP=s.hbp;
      }
      if(s.teamAbbr) p.teamAbbr=s.teamAbbr;
    }
  }
  await saveToFirebase(updated);
  set({ refreshing: false, refreshStatus: "OK Updated!" });
  setTimeout(()=>set({refreshStatus:""}), 3000);
}

// ── Render ────────────────────────────────────────────────────────────────────
function h(tag, attrs={}, ...children) {
  const e = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)) {
    if(k==="style"&&typeof v==="object") Object.assign(e.style,v);
    else if(k.startsWith("on")&&typeof v==="function") e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="class") e.className=v;
    else if(k==="disabled"){ if(v) e.disabled=true; }
    else e.setAttribute(k,v);
  }
  for(const c of children) {
    if(c==null||c===false) continue;
    if(c instanceof Node) e.appendChild(c);
    else e.appendChild(document.createTextNode(String(c)));
  }
  return e;
}

// ── Shared tie-aware ranking logic ────────────────────────────────────────────
// Given a sorted array of scores (desc), returns per-index rank info
function buildRankInfo(scores) {
  const n = scores.length;
  if(n === 0) return [];

  // Find distinct score values in order
  const distinct = [...new Set(scores)]; // highest to lowest
  const firstScore = distinct[0];
  const secondScore = distinct[1] ?? null;  // first losing position
  const lastScore = distinct[distinct.length - 1];

  // Assign true tied rank numbers (1-indexed)
  // e.g. two teams tied at 28 both get rank 2, next team gets rank 4
  const rankNums = scores.map((s, i) => {
    // rank = number of teams strictly above this score + 1
    return scores.filter(x => x > s).length + 1;
  });

  return scores.map((s, i) => {
    const rank = rankNums[i];
    const isFirst = s === firstScore;
    const isSecondPos = secondScore !== null && s === secondScore;
    const isLast = s === lastScore && s !== firstScore; // can't be both first and last unless everyone tied
    // Special case: if only one distinct score, everyone ties for first
    const allTied = distinct.length === 1;

    let icon, isSpecial;
    if(isFirst) {
      icon = "🥇"; isSpecial = true;
    } else if(isSecondPos || isLast) {
      icon = "💀"; isSpecial = true;
    } else {
      icon = `#${rank}`; isSpecial = false;
    }
    return { rank, icon, isSpecial };
  });
}

async function loadYesterday() {
  set({ydLoading:true,ydDone:false,ydResults:null});
  const hits=[];
  for(const team of S.teams) {
    for(const p of (team.players||[])) {
      if(!p.name?.trim()) continue;
      const s = await fetchStats(p.name); if(!s?.playerId) continue;
      const y = await fetchYesterday(s.playerId); if(!y) continue;
      if(p.type==="hr"&&y.hr>0) hits.push({name:p.name,teamAbbr:s.teamAbbr,fantasyTeam:team.name,stat:y.hr,type:"hr"});
      if(p.type==="hbp"&&y.hbp>0) hits.push({name:p.name,teamAbbr:s.teamAbbr,fantasyTeam:team.name,stat:y.hbp,type:"hbp"});
    }
  }
  hits.sort((a,b)=>b.stat-a.stat);
  set({ydLoading:false,ydDone:true,ydResults:hits});
}

async function loadUpToBat() {
  set({utbLoading:true,utbDone:false,utbResults:null,utbApiAbbrs:[]});
  const today = new Date().toISOString().split("T")[0];
  const season = new Date().getFullYear();
  const results = [];
  try {
    for(const ft of S.teams) {
      const hcTeam = HARDCODED_TEAMS.find(hc => hc.id === ft.id);
      for(let i=0; i<(ft.players||[]).length; i++) {
        const p = ft.players[i];
        if(p.droppedAt || !p.name?.trim()) continue;
        const abbr = p.teamAbbr || hcTeam?.players?.[i]?.teamAbbr || null;
        const playerId = PLAYER_IDS[p.name];
        if(!playerId) continue;
        try {
          // Use gameLog for today to see if they have/had a game
          const r = await fetch(`https://statsapi.mlb.com/api/v1/people/${playerId}/stats?stats=gameLog&group=hitting&season=${season}&startDate=${today}&endDate=${today}&sportId=1`);
          if(!r.ok) continue;
          const d = await r.json();
          const split = d.stats?.[0]?.splits?.[0];
          if(!split) continue; // No game today
          const opp = split.opponent?.abbreviation || "?";
          const isHome = split.isHome ?? false;
          const hrs = split.stat?.homeRuns ?? 0;
          const hbps = split.stat?.hitByPitch ?? 0;
          results.push({
            name: p.name, teamAbbr: abbr, type: p.type,
            fantasyTeam: ft.name,
            homeAway: isHome ? "home" : "away",
            opponent: opp,
            gameTime: "Today",
            probablePitcher: null, era: null,
            todayHR: hrs, todayHBP: hbps,
          });
        } catch(e) { continue; }
      }
    }
    set({utbLoading:false, utbDone:true, utbResults:results});
  } catch(e) {
    console.error("UTB error:", e);
    set({utbLoading:false, utbDone:true, utbResults:[]});
  }
}

function buildProjected() {
  const TOTAL_GAMES = 162;
  const seasonStart = new Date("2026-03-26");
  const today = new Date();
  const daysPassed = Math.max(1, Math.floor((today - seasonStart) / (1000*60*60*24)));
  const gamesPlayed = Math.min(Math.round(daysPassed * 0.92), TOTAL_GAMES);
  const gamesRemaining = TOTAL_GAMES - gamesPlayed;
  // Weight: how much to trust actual pace vs preseason projection
  // Starts at 0.1 (10% pace, 90% preseason), reaches 0.9 by game 145
  const paceWeight = Math.min(0.9, gamesPlayed / TOTAL_GAMES * 1.6);
  const projWeight = 1 - paceWeight;

  const wrap = h("div",{style:{animation:"fadeIn 0.4s ease"}});
  wrap.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"4px"}},
    h("span",{style:{fontSize:"20px"}},"🔮"),
    h("h3",{style:{margin:"0",fontSize:"13px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.12em",color:C.muted}},"Projected Final Rankings")
  ));
  wrap.appendChild(h("div",{style:{color:C.muted,fontSize:"12px",marginBottom:"20px"}},"Blends preseason Steamer projections with current pace. Tap a team to see player breakdown."));

  const projTeams = S.teams.map(team => {
    const currentScore = score(team);
    let projectedScore = currentScore;

    (team.players||[]).forEach(p => {
      if(!p.name?.trim()) return;
      const preseason = PRESEASON_PROJ[p.name] ?? null;
      const actual = p.type==="hr" ? (p.effectiveHR||0) : (p.effectiveHBP||0);

      if(preseason === null) {
        // No preseason data - fall back to pure pace
        const rate = actual / Math.max(gamesPlayed, 1);
        projectedScore += rate * gamesRemaining;
      } else {
        // Blended: pace-based remaining + preseason-based remaining
        const paceRate = actual / Math.max(gamesPlayed, 1);
        const paceRemaining = paceRate * gamesRemaining;
        // Preseason remaining = full season proj - already earned at preseason rate
        const preseasonRate = preseason / TOTAL_GAMES;
        const preseasonRemaining = preseasonRate * gamesRemaining;
        // Blend
        projectedScore += (paceWeight * paceRemaining) + (projWeight * preseasonRemaining);
      }
    });

    const projRemaining = Math.round(projectedScore - currentScore);
    return { ...team, currentScore, gamesPlayed, gamesRemaining, projectedScore: Math.round(projectedScore), projRemaining };
  });

  const sorted = [...projTeams].sort((a,b)=>b.projectedScore-a.projectedScore);
  if(sorted.length === 0) {
    wrap.appendChild(h("div",{style:{textAlign:"center",padding:"40px",color:C.muted,fontSize:"13px"}},"Loading..."));
    return wrap;
  }
  const maxProj = Math.max(...sorted.map(t=>t.projectedScore),1);
  const projRankInfo = buildRankInfo(sorted.map(t=>t.projectedScore));

  function rankIcon(i) { return projRankInfo[i].icon; }
  function rankSize(i) { return projRankInfo[i].isSpecial ? "20px" : "14px"; }

  // Season progress bar
  const progressPct = Math.round((gamesPlayed/TOTAL_GAMES)*100);
  const blendLabel = `${Math.round(projWeight*100)}% preseason · ${Math.round(paceWeight*100)}% pace`;
  wrap.appendChild(h("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:"10px",padding:"12px 16px",marginBottom:"20px"}},
    h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"11px",color:C.muted,marginBottom:"6px"}},
      h("span",{},`Game ${gamesPlayed} of ${TOTAL_GAMES}`),
      h("span",{},blendLabel)
    ),
    h("div",{style:{height:"4px",background:C.bg,borderRadius:"2px",overflow:"hidden"}},
      h("div",{style:{height:"100%",width:`${progressPct}%`,background:`linear-gradient(90deg,${C.accent},${C.red})`,borderRadius:"2px"}})
    )
  ));

  sorted.forEach((team,i)=>{
    const pct = (team.projectedScore/maxProj)*100;
    const isFirst = projRankInfo[i].icon === "🥇";
    const card = h("div",{class:"row-hover",style:{background:C.card,border:`1px solid ${isFirst?C.accent+"55":C.border}`,borderRadius:"12px",padding:"14px 18px",marginBottom:"10px",boxShadow:isFirst?`0 0 20px ${C.accent}18`:"none",cursor:"pointer"},onClick:()=>set({projectedTeam:{team, gamesPlayed, gamesRemaining, paceWeight, projWeight}})});
    const topRow = h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}});
    topRow.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:"10px"}},
      h("span",{style:{fontSize:rankSize(i),fontWeight:"700",color:C.muted,minWidth:"28px"}},rankIcon(i)),
      h("div",{},
        h("div",{style:{color:C.text,fontWeight:"700",fontSize:"15px"}},team.name),
        h("div",{style:{color:C.muted,fontSize:"11px"}},team.owner||"")
      )
    ));
    const rightCol = h("div",{style:{textAlign:"right"}});
    rightCol.appendChild(h("div",{style:{color:C.accent,fontFamily:"'Bebas Neue', sans-serif",fontSize:"28px",fontWeight:"800",lineHeight:"1"}},team.projectedScore));
    rightCol.appendChild(h("div",{style:{color:C.muted,fontSize:"10px",textTransform:"uppercase"}},"proj pts"));
    topRow.appendChild(rightCol);
    card.appendChild(topRow);
    const barWrap = h("div",{style:{height:"4px",background:C.bg,borderRadius:"2px",overflow:"hidden",marginBottom:"8px"}});
    barWrap.appendChild(h("div",{style:{height:"100%",width:`${pct}%`,background:isFirst?`linear-gradient(90deg,${C.accent},${C.red})`:`${C.accent}55`,borderRadius:"2px",transition:"width 0.6s ease"}}));
    card.appendChild(barWrap);
    card.appendChild(h("div",{style:{display:"flex",gap:"16px",fontSize:"11px",color:C.muted}},
      h("span",{},`Now: ${team.currentScore} pts`),
      h("span",{},`+${team.projRemaining} projected`),
      h("span",{},`${team.gamesRemaining} games left`)
    ));
    wrap.appendChild(card);
  });

  wrap.appendChild(h("div",{style:{color:C.muted,fontSize:"11px",marginTop:"8px",textAlign:"center",lineHeight:"1.6"}},
    "Steamer 2026 preseason projections · Refresh Stats for latest actuals"
  ));
  return wrap;
}

async function loadHotL7() {
  set({hotL7Loading:true, hotL7Done:false, hotL7:null});
  const season = new Date().getFullYear();
  const now = new Date();
  const endDate = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  const d7 = new Date(now); d7.setDate(d7.getDate()-7);
  const startDate = `${d7.getFullYear()}-${String(d7.getMonth()+1).padStart(2,'0')}-${String(d7.getDate()).padStart(2,'0')}`;
  const result = {}; // keyed by player name
  try {
    for(const ft of S.teams) {
      for(const p of (ft.players||[])) {
        if(!p.name?.trim()) continue;
        const playerId = PLAYER_IDS[p.name]; if(!playerId) continue;
        try {
          const r = await fetch(`https://statsapi.mlb.com/api/v1/people/${playerId}/stats?stats=gameLog&group=hitting&season=${season}&startDate=${startDate}&endDate=${endDate}&sportId=1`);
          if(!r.ok) continue;
          const d = await r.json();
          const splits = d.stats?.[0]?.splits||[];
          let hr=0, hbp=0;
          splits.forEach(s=>{ hr+=s.stat?.homeRuns??0; hbp+=s.stat?.hitByPitch??0; });
          result[p.name] = p.type==="hr" ? hr : hbp;
        } catch(e){ result[p.name]=0; }
      }
    }
    set({hotL7:result, hotL7Loading:false, hotL7Done:true});
  } catch(e) {
    set({hotL7:null, hotL7Loading:false, hotL7Done:true});
  }
}

      const actual = p.type==="hr" ? (p.effectiveHR||0) : (p.effectiveHBP||0);
      const preseason = PRESEASON_PROJ[p.name] ?? null;
      const seasonRate = actual / Math.max(gamesPlayed, 1);
      const seasonPace = Math.round(seasonRate * TOTAL_GAMES);
      const l7val = S.hotL7Done ? (l7[p.name] ?? null) : null;

      // Heat based on L7 if available, else season pace
      let heatLabel = "-", heatColor = C.muted, diff = null;
      if(preseason && preseason > 0) {
        // Use L7 pace if loaded, else fall back to season pace
        const compareVal = l7val !== null
          ? Math.round((l7val / 7) * TOTAL_GAMES) // L7 pace to 162
          : seasonPace;
        const pct = (compareVal - preseason) / preseason;
        diff = seasonPace - preseason;
        if(pct >= 0.20)       { heatLabel="🔥🔥🔥"; heatColor="#ff4444"; }

        else                  { heatLabel="❄️";     heatColor="#6ab0ff"; }

      const isHBP = p.type==="hbp";

      ));

      // Season pace + diff
      const diffStr = diff!==null ? (diff>=0?`+${diff}`:`${diff}`) : "";

      row.appendChild(h("div",{style:{textAlign:"right",minWidth:"60px",flexShrink:0}},

          : h("div",{style:{color:C.muted,fontSize:"10px"}},"-")
      ));

      card.appendChild(row);
    });
    wrap.appendChild(card);
  });

  wrap.appendChild(h("div",{style:{color:C.muted,fontSize:"11px",textAlign:"center",marginTop:"4px"}},"Refresh Stats for latest season totals · L7 loads separately"));
  return wrap;
}

  wrap.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"4px"}},

    h("h3",{style:{margin:"0",fontSize:"13px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.12em",color:C.muted}},"Today's Scores")
  ));
  wrap.appendChild(h("div",{style:{color:C.muted,fontSize:"12px",marginBottom:"20px"}},dateLabel));

  if(!S.scDone && !S.scLoading) {
    wrap.appendChild(h("button",{style:{padding:"12px 28px",borderRadius:"8px",cursor:"pointer",background:C.accent,border:"none",color:"#000",fontWeight:"700",fontSize:"14px"},onClick:loadScores},"Load Today's Scores"));
    return wrap;
  }
  if(S.scLoading) { wrap.appendChild(spinner("Loading scores...")); return wrap; }
  if(!S.scResults || S.scResults.length === 0) {
    wrap.appendChild(h("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:"12px",padding:"28px",textAlign:"center"}},
      h("div",{style:{fontSize:"32px",marginBottom:"8px"}},"😴"),
      h("div",{style:{color:C.text,fontSize:"16px",fontWeight:"700"}},"No Games Today")
    ));
  } else {
    // Sort: drafted games first, then alphabetical
    const sorted = [...S.scResults].sort((a,b)=>{
      const aD = draftedAbbrs.has(a.awayAbbr)||draftedAbbrs.has(a.homeAbbr) ? 0 : 1;
      const bD = draftedAbbrs.has(b.awayAbbr)||draftedAbbrs.has(b.homeAbbr) ? 0 : 1;
      return aD - bD;
    });

    const list = h("div",{style:{display:"flex",flexDirection:"column",gap:"10px"}});
    sorted.forEach(game => {
      const hasDrafted = draftedAbbrs.has(game.awayAbbr) || draftedAbbrs.has(game.homeAbbr);
      const isFinal = ["Final","Game Over","Completed Early","Completed"].some(s=>game.status?.includes(s));
      const isLive = ["In Progress","Warmup","Pre-Game"].some(s=>game.status?.includes(s)) || game.status==="Live";
      const statusColor = isLive ? C.green : C.muted;

      const card = h("div",{style:{
        background:C.card,
        border:`1px solid ${hasDrafted?C.accent+"55":C.border}`,
        borderRadius:"12px",
        overflow:"hidden",
        boxShadow:hasDrafted?`0 0 12px ${C.accent}15`:"none"
      }});

      // ── Matchup header ──
      const mhdr = h("div",{style:{padding:"10px 14px",borderBottom:hasDrafted?`1px solid ${C.border}33`:"none"}});

      // Status row
      const statusRow = h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}});
      const statusEl = h("span",{style:{color:statusColor,fontSize:"11px",fontWeight:"700",textTransform:"uppercase"}},
        isLive ? `🔴 ${game.inning||game.status}` : isFinal ? "Final" : game.status
      );
      statusRow.appendChild(statusEl);
      if(!isFinal && !isLive && game.gameTime) {
        statusRow.appendChild(h("span",{style:{color:C.muted,fontSize:"11px"}},game.gameTime));
      }
      if(isFinal) statusRow.appendChild(h("span",{style:{color:C.muted,fontSize:"10px"}},"refresh stats in 1-2 hrs"));
      mhdr.appendChild(statusRow);

      // Teams + score row
      const matchup = h("div",{style:{display:"grid",gridTemplateColumns:"1fr auto 1fr",alignItems:"center",gap:"8px"}});
      const awayDrafted = draftedAbbrs.has(game.awayAbbr);
      const homeDrafted = draftedAbbrs.has(game.homeAbbr);

      const awayEl = h("div",{style:{textAlign:"left"}});
      awayEl.appendChild(h("div",{style:{color:awayDrafted?C.accent:C.text,fontWeight:awayDrafted?"800":"600",fontSize:"17px"}},game.awayAbbr));
      awayEl.appendChild(h("div",{style:{color:C.muted,fontSize:"11px"}},game.awayName));
      matchup.appendChild(awayEl);

      const scoreEl = h("div",{style:{textAlign:"center"}});
      if(isFinal||isLive) {
        scoreEl.appendChild(h("div",{style:{color:C.text,fontFamily:"'Bebas Neue', sans-serif",fontSize:"24px",fontWeight:"800",lineHeight:"1"}},`${game.awayScore} - ${game.homeScore}`));
      } else {
        scoreEl.appendChild(h("div",{style:{color:C.muted,fontSize:"16px",fontWeight:"700"}},"vs"));
      }
      matchup.appendChild(scoreEl);

      const homeEl = h("div",{style:{textAlign:"right"}});
      homeEl.appendChild(h("div",{style:{color:homeDrafted?C.accent:C.text,fontWeight:homeDrafted?"800":"600",fontSize:"17px"}},game.homeAbbr));
      homeEl.appendChild(h("div",{style:{color:C.muted,fontSize:"11px"}},game.homeName));
      matchup.appendChild(homeEl);

      mhdr.appendChild(matchup);
      card.appendChild(mhdr);

      // ── Drafted players in this game ──
      if(hasDrafted) {
        const playersInGame = [
          ...(abbrToPlayers[game.awayAbbr]||[]),
          ...(abbrToPlayers[game.homeAbbr]||[])
        ];
        playersInGame.forEach((p,i) => {
          const isHBP = p.type==="hbp";
          const color = isHBP ? C.green : C.red;
          const row = h("div",{style:{
            display:"flex",alignItems:"center",gap:"10px",
            padding:"8px 14px",
            borderTop:`1px solid ${C.border}22`,
            background:`${color}06`
          }});
          const nameEl = h("span",{style:{color:C.text,fontSize:"13px",fontWeight:"600",flex:"1"}},p.name);
          if(p.teamAbbr) nameEl.appendChild(h("span",{style:{color:C.muted,fontWeight:"400",fontSize:"12px"}},` (${p.teamAbbr})`));
          row.appendChild(nameEl);
          row.appendChild(h("div",{style:{color:C.muted,fontSize:"11px"}},p.fantasyTeam));
          row.appendChild(badge(isHBP?"HBP":"HR",color));
          card.appendChild(row);
        });
      }

      list.appendChild(card);
    });
    wrap.appendChild(list);
  }

  wrap.appendChild(h("button",{style:{width:"100%",marginTop:"16px",padding:"10px",background:"transparent",border:`1px solid ${C.border}`,borderRadius:"8px",color:C.muted,cursor:"pointer",fontSize:"13px"},onClick:loadScores},"Refresh Refresh Scores"));
  return wrap;
}

async function loadScores() {
  set({scLoading:true,scDone:false,scResults:null});
  try {
    const now = new Date();
    const today = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    const r = await fetch(`https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${today}&hydrate=linescore,team`);
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    const games = d.dates?.[0]?.games || [];
    console.log("Scores API sample game:", JSON.stringify(games[0], null, 2).slice(0, 800));

    // Hardcoded MLB team ID → abbreviation (these never change)
    const TEAM_ABBR = {
      108:"LAA",109:"ARI",110:"BAL",111:"BOS",112:"CHC",113:"CIN",114:"CLE",
      115:"COL",116:"DET",117:"HOU",118:"KC",119:"LAD",120:"WSH",121:"NYM",
      133:"ATH",134:"PIT",135:"SD",136:"SEA",137:"SF",138:"STL",139:"TB",
      140:"TEX",141:"TOR",142:"MIN",143:"PHI",144:"ATL",145:"CWS",146:"MIA",
      147:"NYY",158:"MIL"
    };
    const TEAM_NAME = {
      108:"Angels",109:"D-backs",110:"Orioles",111:"Red Sox",112:"Cubs",
      113:"Reds",114:"Guardians",115:"Rockies",116:"Tigers",117:"Astros",
      118:"Royals",119:"Dodgers",120:"Nationals",121:"Mets",133:"Athletics",
      134:"Pirates",135:"Padres",136:"Mariners",137:"Giants",138:"Cardinals",
      139:"Rays",140:"Rangers",141:"Blue Jays",142:"Twins",143:"Phillies",
      144:"Braves",145:"White Sox",146:"Marlins",147:"Yankees",158:"Brewers"
    };

    const results = games.map(g => {
      const awayId = g.teams?.away?.team?.id;
      const homeId = g.teams?.home?.team?.id;
      const linescore = g.linescore;
      return {
        awayAbbr: TEAM_ABBR[awayId] || g.teams?.away?.team?.abbreviation || "?",
        awayName: TEAM_NAME[awayId] || g.teams?.away?.team?.teamName || "",
        awayScore: linescore?.teams?.away?.runs ?? g.teams?.away?.score ?? "-",
        homeAbbr: TEAM_ABBR[homeId] || g.teams?.home?.team?.abbreviation || "?",
        homeName: TEAM_NAME[homeId] || g.teams?.home?.team?.teamName || "",
        homeScore: linescore?.teams?.home?.runs ?? g.teams?.home?.score ?? "-",
        status: g.status?.detailedState || g.status?.abstractGameState || "Scheduled",
        inning: linescore?.currentInningOrdinal || null,
        gameTime: g.gameDate ? new Date(g.gameDate).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}) : null,
      };
    });
    set({scLoading:false,scDone:true,scResults:results});
  } catch(e) {
    set({scLoading:false,scDone:true,scResults:[]});
  }
}

// ── Weekly Recap ──────────────────────────────────────────────────────────────
async function loadWeeklyRecap(startDate, endDate) {
  set({wkLoading:true,wkDone:false,wkResults:null});
  const season = new Date().getFullYear();
  const teamWeeks = S.teams.map(t=>({id:t.id, name:t.name, hr:0, hbp:0, pts:0}));
  const allPlayers = [];
  try {
    for(const ft of S.teams) {
      const tw = teamWeeks.find(t=>t.id===ft.id);
      for(const p of (ft.players||[])) {
        if(!p.name?.trim()) continue;
        const playerId = PLAYER_IDS[p.name]; if(!playerId) continue;
        try {
          const r = await fetch(`https://statsapi.mlb.com/api/v1/people/${playerId}/stats?stats=gameLog&group=hitting&season=${season}&startDate=${startDate}&endDate=${endDate}&sportId=1`);
          if(!r.ok) continue;
          const d = await r.json();
          const splits = d.stats?.[0]?.splits||[];
          let hr=0,hbp=0;
          splits.forEach(s=>{ hr+=s.stat?.homeRuns??0; hbp+=s.stat?.hitByPitch??0; });
          const pts = p.type==="hr"?hr:hbp;
          if(p.type==="hr") tw.hr+=hr;
          if(p.type==="hbp") tw.hbp+=hbp;
          tw.pts+=pts;
          allPlayers.push({name:p.name,fantasyTeam:ft.name,type:p.type,pts,hr,hbp});
        } catch(e){continue;}
      }
    }

    const hrPlayers = allPlayers.filter(p=>p.type==="hr").sort((a,b)=>b.pts-a.pts);
    const hbpPlayers = allPlayers.filter(p=>p.type==="hbp").sort((a,b)=>b.pts-a.pts);
    const topTeam = [...teamWeeks].sort((a,b)=>b.pts-a.pts)[0];

    set({wkLoading:false,wkDone:true,wkResults:{
      teamWeeks,
      allPlayers,
      topHR: hrPlayers[0]?{name:hrPlayers[0].name,val:hrPlayers[0].pts}:null,
      topHBP: hbpPlayers[0]?{name:hbpPlayers[0].name,val:hbpPlayers[0].pts}:null,
      teamOfWeek: topTeam?{name:topTeam.name,pts:topTeam.pts}:null,
    }});
  } catch(e) {
    set({wkLoading:false,wkDone:true,wkResults:null});
  }
}

// ── History ───────────────────────────────────────────────────────────────────
function buildHistory() {
  // Trigger load if not yet loaded
  if(S.historyWeeks === null && !S.historyLoading) loadHistory();

  const wrap = h("div",{style:{animation:"fadeIn 0.4s ease"}});
  wrap.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"4px"}},
    h("span",{style:{fontSize:"20px"}},"📈"),
    h("h3",{style:{margin:"0",fontSize:"13px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.12em",color:C.muted}},"Season History")
  ));
  wrap.appendChild(h("div",{style:{color:C.muted,fontSize:"12px",marginBottom:"20px"}},"Weekly standings snapshots · Saved automatically every Monday"));

  if(S.historyLoading) { wrap.appendChild(spinner("Loading history...")); return wrap; }

  if(!S.historyWeeks || S.historyWeeks.length === 0) {
    wrap.appendChild(h("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:"12px",padding:"32px",textAlign:"center"}},
      h("div",{style:{fontSize:"32px",marginBottom:"8px"}},"📭"),
      h("div",{style:{color:C.text,fontWeight:"700",fontSize:"16px",marginBottom:"6px"}},"No snapshots yet"),
      h("div",{style:{color:C.muted,fontSize:"13px",marginBottom:"20px"}},"History saves automatically every Monday. You can also save a snapshot now."),
      S.commishUnlocked ? h("button",{style:{padding:"10px 24px",borderRadius:"8px",cursor:"pointer",background:C.accent,border:"none",color:"#000",fontWeight:"700",fontSize:"13px"},onClick:async(e)=>{
        const btn = e.target;
        btn.textContent = "Saving...";
        btn.disabled = true;
        const ok = await saveHistorySnapshot(`Week of ${new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"})}`);
        if(ok) { btn.textContent = "✅ Saved!"; loadHistory(); }
        else { btn.textContent = "❌ Failed - check Firebase rules"; btn.disabled = false; }
      }},"💾 Save Snapshot Now") : h("div",{style:{color:C.muted,fontSize:"12px"}},"Enter commissioner PIN to save a snapshot manually")
    ));
    return wrap;
  }

  const weeks = S.historyWeeks;
  const idx = Math.max(0, Math.min(S.historyWeekIdx, weeks.length - 1));
  const current = weeks[idx];
  const prev = idx > 0 ? weeks[idx - 1] : null;

  // Week selector
  const selector = h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",background:C.card,border:`1px solid ${C.border}`,borderRadius:"10px",padding:"10px 16px",marginBottom:"20px"}});
  selector.appendChild(h("button",{style:{background:"none",border:"none",color:idx>0?C.accent:C.border,fontSize:"22px",cursor:idx>0?"pointer":"default",padding:"0 4px"},onClick:()=>idx>0&&set({historyWeekIdx:idx-1})},"‹"));
  const midEl = h("div",{style:{textAlign:"center"}});
  midEl.appendChild(h("div",{style:{color:C.text,fontWeight:"700",fontSize:"14px"}},current.label));
  midEl.appendChild(h("div",{style:{color:C.muted,fontSize:"11px"}},`${idx+1} of ${weeks.length}`));
  selector.appendChild(midEl);
  selector.appendChild(h("button",{style:{background:"none",border:"none",color:idx<weeks.length-1?C.accent:C.border,fontSize:"22px",cursor:idx<weeks.length-1?"pointer":"default",padding:"0 4px"},onClick:()=>idx<weeks.length-1&&set({historyWeekIdx:idx+1})},"›"));
  wrap.appendChild(selector);

  // Standings for this week
  const list = h("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:"12px",overflow:"hidden",marginBottom:"20px"}});
  current.standings.forEach((team, i) => {
    const prevRank = prev ? prev.standings.findIndex(t=>t.id===team.id) : -1;
    const movement = prev && prevRank !== -1 ? prevRank - i : null; // positive = moved up
    let movEl;
    if(movement === null) movEl = h("span",{style:{color:C.muted,fontSize:"12px"}},"-");
    else if(movement > 0) movEl = h("span",{style:{color:"#4caf50",fontSize:"12px",fontWeight:"700"}},`↑${movement}`);
    else if(movement < 0) movEl = h("span",{style:{color:"#6ab0ff",fontSize:"12px",fontWeight:"700"}},`↓${Math.abs(movement)}`);
    else movEl = h("span",{style:{color:C.muted,fontSize:"12px"}},"-");

    const isFirst = i === 0;
    const isLast = i === current.standings.length - 1;
    const row = h("div",{style:{
      display:"flex",alignItems:"center",gap:"12px",padding:"12px 16px",
      borderBottom:i<current.standings.length-1?`1px solid ${C.border}22`:"none",
      background:isFirst?`${C.accent}08`:isLast?`#6ab0ff08`:"transparent"
    }});

    // Rank
    let rankEl;
    if(isFirst) rankEl = h("span",{style:{fontSize:"18px",minWidth:"28px",textAlign:"center"}},"🥇");
    else if(isLast) rankEl = h("span",{style:{fontSize:"18px",minWidth:"28px",textAlign:"center"}},"💀");
    else rankEl = h("span",{style:{color:C.muted,fontWeight:"700",fontSize:"13px",minWidth:"28px",textAlign:"center"}},`#${i+1}`);
    row.appendChild(rankEl);

    // Team info
    const info = h("div",{style:{flex:"1"}});
    info.appendChild(h("div",{style:{color:C.text,fontWeight:"700",fontSize:"14px"}},team.name));
    info.appendChild(h("div",{style:{color:C.muted,fontSize:"11px"}},team.owner));
    row.appendChild(info);

    // Movement
    row.appendChild(movEl);

    // Score
    const scoreEl = h("div",{style:{textAlign:"right",minWidth:"48px"}});
    scoreEl.appendChild(h("div",{style:{color:C.accent,fontFamily:"'Bebas Neue', sans-serif",fontSize:"26px",fontWeight:"800",lineHeight:"1"}},team.score));
    scoreEl.appendChild(h("div",{style:{color:C.muted,fontSize:"10px",textTransform:"uppercase"}},"pts"));
    row.appendChild(scoreEl);
    list.appendChild(row);
  });
  wrap.appendChild(list);

  // Commish save button
  if(S.commishUnlocked) {
    wrap.appendChild(h("button",{
      style:{width:"100%",padding:"10px",background:"transparent",border:`1px solid ${C.border}`,borderRadius:"8px",color:C.muted,cursor:"pointer",fontSize:"13px"},
      onClick:async(e)=>{
        const btn = e.target;
        btn.textContent = "Saving...";
        btn.disabled = true;
        const ok = await saveHistorySnapshot(`Week of ${new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"})}`);
        if(ok) { btn.textContent = "✅ Saved!"; loadHistory(); }
        else { btn.textContent = "❌ Failed - check Firebase rules"; btn.style.color = C.red; btn.disabled = false; }
      }
    },"💾 Save Snapshot Now"));
  }

  return wrap;
}

// ── Rules ─────────────────────────────────────────────────────────────────────
function buildRules() {
  // All-Star Game: July 14, 2026 @ 8:00 PM ET = midnight UTC July 15
  const allStarDate = new Date("2026-07-14T20:00:00-04:00");
  const now = new Date();
  const diff = allStarDate - now;
  const days = Math.floor(diff / (1000*60*60*24));
  const hours = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
  const mins = Math.floor((diff % (1000*60*60)) / (1000*60));
  const countdown = diff > 0
    ? `${days}d ${hours}h ${mins}m`
    : "🎉 The All-Star Game is here!";

  const wrap = h("div",{style:{animation:"fadeIn 0.4s ease"}});
  wrap.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"20px"}},
    h("span",{style:{fontSize:"20px"}},"📖"),
    h("h3",{style:{margin:"0",fontSize:"13px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.12em",color:C.muted}},"League Rules · Dingers Only 2026")

  // Rules sections
  const section = (emoji, title, items) => {

    card.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"14px"}},

      h("span",{style:{color:C.accent,fontSize:"12px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.1em"}},title)
    ));
    items.forEach(item => {
      const row = h("div",{style:{display:"flex",gap:"12px",marginBottom:"10px",alignItems:"flex-start"}});

      row.appendChild(h("span",{style:{color:C.text,fontSize:"13px",lineHeight:"1.6"}},item.text));
      card.appendChild(row);
    });
    return card;
  };

  wrap.appendChild(section("📋","Format",[
    {num:"1", text:"Draft 8 players - no bench, no active roster management. You live with injury and suspension luck."},
    {num:"2", text:"1 of your 8 picks is designated as your HBP player. Their HRs do not count toward your team total."},
    {num:"3", text:"Scoring: Home Runs + Hit By Pitches = Total Points."},

  wrap.appendChild(section("⚔️","Tiebreaker",[

      const sc = r.status.startsWith("✅")?C.green:r.status.startsWith("⚠️")?C.accent:C.red;
      const card = h("div",{style:{background:C.card,border:`1px solid ${sc}33`,borderRadius:"10px",padding:"12px 16px"}});
      const top = h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"8px"}});
      const left = h("div",{style:{flex:"1"}},
        h("div",{style:{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}},
          h("span",{style:{color:C.text,fontWeight:"700",fontSize:"14px"}},r.name),
          h("span",{style:{color:sc,fontSize:"12px",fontWeight:"600"}},r.status)
        ),
        h("div",{style:{color:C.muted,fontSize:"11px",marginTop:"2px"}},`${r.fantasyTeam} · ${r.detail}`)
      );
      top.appendChild(left);
      if(r.hr!==null) {
        top.appendChild(h("div",{style:{display:"flex",gap:"10px",alignItems:"center",flexShrink:"0"}},
          r.mlbTeam?h("span",{style:{color:C.muted,fontSize:"11px",fontWeight:"700"}},r.mlbTeam):null,
          h("span",{style:{color:C.red,fontFamily:"'Bebas Neue', sans-serif",fontSize:"20px"}},`${r.hr} HR`),
          h("span",{style:{color:C.green,fontFamily:"'Bebas Neue', sans-serif",fontSize:"20px"}},`${r.hbp} HBP`)
        ));
      }
      card.appendChild(top);
      list.appendChild(card);
    });
    wrap.appendChild(list);
  }
  if(S.dbDone) {
    const ok=S.dbResults.filter(r=>r.status.startsWith("✅")).length;
    const warn=S.dbResults.filter(r=>r.status.startsWith("⚠️")).length;
    const err=S.dbResults.filter(r=>r.status.startsWith("❌")).length;
    wrap.appendChild(h("div",{style:{marginTop:"16px"}},
      h("div",{style:{color:C.muted,fontSize:"12px",marginBottom:"12px"}},`✅ ${ok} ok · ⚠️ ${warn} no stats · ❌ ${err} not found`),
      h("button",{style:{padding:"8px 18px",borderRadius:"7px",cursor:"pointer",background:"transparent",border:`1px solid ${C.border}`,color:C.muted,fontSize:"13px"},onClick:runDebug},"Refresh Run Again")
    ));
  }
  return wrap;
}

async function runDebug() {
  set({dbRunning:true,dbDone:false,dbResults:[]});
  const out=[];
  for(const team of S.teams) {
    for(const p of (team.players||[])) {
      if(!p.name?.trim()) continue;
      try {
        let playerId = PLAYER_IDS[p.name] || null;
        let matchedName = p.name;
        if (!playerId) {
          const r = await fetch(`https://statsapi.mlb.com/api/v1/people/search?names=${encodeURIComponent(p.name)}&sportId=1`);
          const d = await r.json();
          const person = d.people?.[0];
          if(!person){ out.push({name:p.name,fantasyTeam:team.name,status:"❌ Not found",detail:"No player matched this name",hr:null,hbp:null,mlbTeam:null}); set({dbResults:[...out]}); continue; }
          playerId = person.id;
          matchedName = person.fullName;
        }
        const season=new Date().getFullYear();
        const r2=await fetch(`https://statsapi.mlb.com/api/v1/people/${playerId}/stats?stats=season&group=hitting&season=${season}&sportId=1`);
        const d2=await r2.json();
        const split=d2.stats?.[0]?.splits?.[0];
        if(!split) out.push({name:p.name,fantasyTeam:team.name,status:"⚠️ No stats yet",detail:`Found as "${matchedName}" but no ${season} stats`,hr:null,hbp:null,mlbTeam:null});
        else out.push({name:p.name,fantasyTeam:team.name,status:"✅ OK",detail:`Matched as "${matchedName}"`,hr:split.stat?.homeRuns??0,hbp:split.stat?.hitByPitch??0,mlbTeam:split.team?.abbreviation??null});
      } catch(e){ out.push({name:p.name,fantasyTeam:team.name,status:"💥 Error",detail:String(e),hr:null,hbp:null,mlbTeam:null}); }
      set({dbResults:[...out]});
    }
  }
  set({dbRunning:false,dbDone:true});
}

// ── Rosters ───────────────────────────────────────────────────────────────────

  const sorted = [...S.teams].sort((a,b)=>score(b)-score(a));

    const totalScore = score(team);

    const tscore = h("div",{style:{textAlign:"right"}},
      h("div",{style:{color:C.accent,fontFamily:"'Bebas Neue', sans-serif",fontSize:"28px",fontWeight:"800",lineHeight:"1"}},totalScore),
      h("div",{style:{color:C.muted,fontSize:"10px",textTransform:"uppercase",letterSpacing:"0.08em"}},"Total Pts")
    );
    thdr.append(tinfo,tscore);
    card.appendChild(thdr);

    // HR players
    hrPlayers.forEach((p,i)=>{
      const pts = p.effectiveHR||0;
      const row = h("div",{class:"row-hover",style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"11px 18px",borderBottom:`1px solid ${C.border}22`,opacity:p.droppedAt?"0.5":"1",background:"transparent",cursor:"pointer"},onClick:()=>openSpotlight(p.name,team.name,p.type)});

      left.appendChild(nameEl);
      const tags = h("div",{style:{display:"flex",gap:"6px",alignItems:"center",marginTop:"2px"}});
      tags.appendChild(badge("HR",C.red));
      if(p.droppedAt) tags.appendChild(h("span",{style:{color:C.muted,fontSize:"10px"}},`dropped ${fmtDate(p.droppedAt)}`));
      if(p.addedAt) tags.appendChild(h("span",{style:{color:C.green,fontSize:"10px"}},`added ${fmtDate(p.addedAt)}`));
      left.appendChild(tags);
      const right = h("div",{style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"2px"}});
      right.appendChild(h("span",{style:{color:C.red,fontFamily:"'Bebas Neue', sans-serif",fontSize:"24px",fontWeight:"800",lineHeight:"1"}},pts));
      right.appendChild(h("span",{style:{color:C.muted,fontSize:"10px",textTransform:"uppercase"}},pts===1?"point":"points"));
      row.append(left,right);
      card.appendChild(row);
    });

    // HBP player
    if(hbpPlayer){
      const pts = hbpPlayer.effectiveHBP||0;
      const row = h("div",{class:"row-hover",style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"11px 18px",opacity:hbpPlayer.droppedAt?"0.5":"1",background:`${C.green}08`,borderTop:`1px solid ${C.border}22`,cursor:"pointer"},onClick:()=>openSpotlight(hbpPlayer.name,team.name,hbpPlayer.type)});

      const nameEl = h("span",{style:{color:C.text,fontSize:"14px",fontWeight:"600"}},hbpPlayer.name);
      if(hbpPlayer.teamAbbr) nameEl.appendChild(h("span",{style:{color:C.muted,fontWeight:"400"}},` (${hbpPlayer.teamAbbr})`));
      left.appendChild(nameEl);
      const tags = h("div",{style:{display:"flex",gap:"6px",alignItems:"center",marginTop:"2px"}});

      if(hbpPlayer.droppedAt) tags.appendChild(h("span",{style:{color:C.muted,fontSize:"10px"}},`dropped ${fmtDate(hbpPlayer.droppedAt)}`));
      if(hbpPlayer.addedAt) tags.appendChild(h("span",{style:{color:C.green,fontSize:"10px"}},`added ${fmtDate(hbpPlayer.addedAt)}`));

      right.appendChild(h("span",{style:{color:C.green,fontFamily:"'Bebas Neue', sans-serif",fontSize:"24px",fontWeight:"800",lineHeight:"1"}},pts));

      row.append(left,right);
      card.appendChild(row);
    }

    // Team total bar
    const allScores = S.teams.map(t=>score(t));
    const maxScore = Math.max(...allScores,1);
    const pct = (totalScore/maxScore)*100;
    const barWrap = h("div",{style:{padding:"10px 18px",borderTop:`1px solid ${C.border}22`,background:C.surface}});

    barWrap.appendChild(barTrack);
    card.appendChild(barWrap);

    wrap.appendChild(card);
  });

  return wrap;
}

// ── Player Spotlight ──────────────────────────────────────────────────────────
async function openSpotlight(playerName, fantasyTeam, type) {
  set({spotlightPlayer:{name:playerName, fantasyTeam, type}, spotlightData:null, spotlightLoading:true});
  const playerId = PLAYER_IDS[playerName];
  if(!playerId) { set({spotlightLoading:false}); return; }
  const season = new Date().getFullYear();
  try {
    const [sr, lr] = await Promise.all([
      fetch(`https://statsapi.mlb.com/api/v1/people/${playerId}/stats?stats=season&group=hitting&season=${season}&sportId=1`),
      fetch(`https://statsapi.mlb.com/api/v1/people/${playerId}/stats?stats=lastXGames&group=hitting&season=${season}&sportId=1&limit=7`)
    ]);
    const [sd, ld] = await Promise.all([sr.json(), lr.json()]);
    const season_split = sd.stats?.[0]?.splits?.[0]?.stat || {};
    const last7_split = ld.stats?.[0]?.splits?.[0]?.stat || {};
    set({spotlightLoading:false, spotlightData:{season:season_split, last7:last7_split, playerId}});
  } catch(e) {
    set({spotlightLoading:false, spotlightData:null});
  }
}

// ── Projected Team Breakdown Modal ────────────────────────────────────────────
function buildProjectedTeamModal() {
  const {team, gamesPlayed, gamesRemaining, paceWeight, projWeight} = S.projectedTeam;
  const TOTAL_GAMES = 162;

  const overlay = h("div",{style:{position:"fixed",inset:"0",background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:"1100",padding:"16px"},onClick:()=>set({projectedTeam:null})});
  const modal = h("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:"16px",padding:"0",maxWidth:"420px",width:"100%",maxHeight:"88vh",overflowY:"auto"},onClick:e=>e.stopPropagation()});

  // Header
  const hdr = h("div",{style:{padding:"20px 20px 14px",borderBottom:`1px solid ${C.border}`}});
  hdr.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"4px"}},
    h("div",{},
      h("div",{style:{color:C.text,fontWeight:"800",fontSize:"18px"}},team.name),
      h("div",{style:{color:C.muted,fontSize:"12px",marginTop:"2px"}},team.owner||"")
    ),
    h("button",{style:{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:"20px",lineHeight:"1"},onClick:()=>set({projectedTeam:null})},"✕")
  ));
  hdr.appendChild(h("div",{style:{color:C.muted,fontSize:"11px"}},
    `${Math.round(projWeight*100)}% preseason · ${Math.round(paceWeight*100)}% pace · ${gamesRemaining} games left`
  ));
  modal.appendChild(hdr);

  // Per-player projection helper
  const playerProj = (p) => {
    const actual = p.type==="hr" ? (p.effectiveHR||0) : (p.effectiveHBP||0);
    const preseason = PRESEASON_PROJ[p.name] ?? null;
    let projFinal;
    if(preseason === null) {
      const rate = actual / Math.max(gamesPlayed, 1);
      projFinal = actual + rate * gamesRemaining;
    } else {
      const paceRate = actual / Math.max(gamesPlayed, 1);
      const paceRemaining = paceRate * gamesRemaining;
      const preseasonRemaining = (preseason / TOTAL_GAMES) * gamesRemaining;
      projFinal = actual + (paceWeight * paceRemaining) + (projWeight * preseasonRemaining);
    }
    const projRounded = Math.round(projFinal);
    const diff = preseason !== null ? projRounded - preseason : null;
    // Heat based on season pace vs preseason
    let heat = "-";
    if(preseason && preseason > 0) {
      const seasonPace = Math.round((actual / Math.max(gamesPlayed,1)) * TOTAL_GAMES);
      const pct = (seasonPace - preseason) / preseason;
      if(pct >= 0.20)       heat = "🔥🔥🔥";
      else if(pct >= 0)     heat = "🔥🔥";
      else if(pct >= -0.20) heat = "🔥";
      else                  heat = "❄️";
    }
    return { actual, preseason, projFinal: projRounded, diff, heat };
  };

  // Column header row
  const colHdr = () => h("div",{style:{display:"flex",alignItems:"center",gap:"4px",padding:"5px 16px",background:C.surface}},
    h("div",{style:{minWidth:"24px"}},""),
    h("div",{style:{flex:"1"}},""),
    h("div",{style:{minWidth:"28px",textAlign:"right",color:C.muted,fontSize:"9px",textTransform:"uppercase",letterSpacing:"0.07em",fontWeight:"700"}},"now"),
    h("div",{style:{minWidth:"34px",textAlign:"right",color:C.muted,fontSize:"9px",textTransform:"uppercase",letterSpacing:"0.07em",fontWeight:"700"}},"proj"),
    h("div",{style:{minWidth:"32px",textAlign:"right",color:C.muted,fontSize:"9px",textTransform:"uppercase",letterSpacing:"0.07em",fontWeight:"700"}},"vs pre")
  );

  // Section builder
  const buildSection = (players, typeColor, typeLabel) => {
    if(!players.length) return;
    const sectionLbl = h("div",{style:{color:typeColor,fontSize:"10px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.1em",padding:"12px 16px 0"}},typeLabel);
    modal.appendChild(sectionLbl);
    modal.appendChild(colHdr());
    const list = h("div",{style:{marginBottom:"8px"}});
    players.forEach((p,i) => {
      const {actual, preseason, projFinal, diff, heat} = playerProj(p);
      const isLast = i === players.length - 1;
      const row = h("div",{
        class:"row-hover",
        style:{display:"flex",alignItems:"center",gap:"4px",padding:"9px 16px",
          borderBottom:isLast?"none":`1px solid ${C.border}22`,cursor:"pointer"},
        onClick:()=>openSpotlight(p.name,team.name,p.type)
      });

      // Heat emoji
      row.appendChild(h("div",{style:{minWidth:"24px",fontSize:"13px",lineHeight:"1"}},heat));

      // Name + preseason ref
      const nameCol = h("div",{style:{flex:"1",minWidth:0}});
      const nameEl = h("span",{style:{color:p.droppedAt?C.muted:C.text,fontWeight:"600",fontSize:"13px"}},p.name);
      if(p.teamAbbr) nameEl.appendChild(h("span",{style:{color:C.muted,fontWeight:"400",fontSize:"11px"}},` (${p.teamAbbr})`));
      nameCol.appendChild(nameEl);
      if(preseason !== null) nameCol.appendChild(h("div",{style:{color:C.muted,fontSize:"9px",marginTop:"1px"}},`pre: ${preseason}`));
      row.appendChild(nameCol);

      // Now
      const nowEl = h("div",{style:{minWidth:"28px",textAlign:"right"}});
      nowEl.appendChild(h("div",{style:{color:typeColor,fontFamily:"'Bebas Neue', sans-serif",fontSize:"18px",fontWeight:"800",lineHeight:"1"}},actual));
      row.appendChild(nowEl);

      // Proj
      const projEl = h("div",{style:{minWidth:"34px",textAlign:"right"}});
      projEl.appendChild(h("div",{style:{color:typeColor,fontFamily:"'Bebas Neue', sans-serif",fontSize:"22px",fontWeight:"800",lineHeight:"1"}},projFinal));
      projEl.appendChild(h("div",{style:{color:C.muted,fontSize:"8px",textTransform:"uppercase"}},"proj"));
      row.appendChild(projEl);

      // vs preseason diff
      const diffEl = h("div",{style:{minWidth:"32px",textAlign:"right"}});
      if(diff !== null) {
        const diffColor = diff > 0 ? "#4caf50" : diff < 0 ? "#6ab0ff" : C.muted;
        const diffStr = diff > 0 ? `+${diff}` : `${diff}`;
        diffEl.appendChild(h("div",{style:{color:diffColor,fontSize:"12px",fontWeight:"800",lineHeight:"1"}},diffStr));
        diffEl.appendChild(h("div",{style:{color:C.muted,fontSize:"8px",textTransform:"uppercase"}},"vs pre"));
      } else {
        diffEl.appendChild(h("div",{style:{color:C.muted,fontSize:"11px"}},"-"));
      }
      row.appendChild(diffEl);
      list.appendChild(row);
    });
    modal.appendChild(list);
  };

  buildSection((team.players||[]).filter(p=>p.type==="hr"&&!p.droppedAt), C.red, "HR Players");
  buildSection((team.players||[]).filter(p=>p.type==="hbp"&&!p.droppedAt), C.green, "HBP Player");

  // Team total
  const allPlayers = (team.players||[]).filter(p=>!p.droppedAt);
  const totalProj = allPlayers.reduce((s,p)=>s+playerProj(p).projFinal, 0);
  modal.appendChild(h("div",{style:{background:`${C.accent}11`,border:`1px solid ${C.accent}33`,margin:"8px 16px 16px",borderRadius:"10px",padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}},
    h("div",{},
      h("div",{style:{color:C.muted,fontSize:"11px",fontWeight:"600"}},"Projected Team Total"),
      h("div",{style:{color:C.muted,fontSize:"9px",marginTop:"2px"}},"🔥🔥🔥 20%+ above pre  🔥🔥 on pace  🔥 slightly below  ❄️ cold"})
    ),
    h("span",{style:{color:C.accent,fontFamily:"'Bebas Neue', sans-serif",fontSize:"28px",fontWeight:"800"}},totalProj)
  ));

  modal.appendChild(h("button",{style:{width:"calc(100% - 32px)",margin:"0 16px 16px",padding:"10px",background:"transparent",border:`1px solid ${C.border}`,borderRadius:"8px",color:C.muted,cursor:"pointer",fontSize:"14px"},onClick:()=>set({projectedTeam:null})},"Close"));
  overlay.appendChild(modal);
  return overlay;
}

function buildTeamModal(team) {
  const overlay = h("div",{style:{position:"fixed",inset:"0",background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:"1000",padding:"16px"},onClick:()=>set({selectedTeam:null})});
  const modal = h("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:"16px",padding:"28px",maxWidth:"480px",width:"100%",maxHeight:"90vh",overflowY:"auto"},onClick:e=>e.stopPropagation()});
  const sc = score(team);
  modal.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"20px"}},
    h("div",{},h("h2",{style:{color:C.text,fontSize:"22px",fontWeight:"800",margin:"0"}},team.name),team.owner?h("p",{style:{color:C.muted,fontSize:"13px",margin:"4px 0 0"}},team.owner):null),
    h("div",{style:{textAlign:"right"}},h("div",{style:{color:C.accent,fontSize:"36px",fontWeight:"800",fontFamily:"'Bebas Neue', sans-serif",lineHeight:"1"}},sc),h("div",{style:{color:C.muted,fontSize:"11px",textTransform:"uppercase",letterSpacing:"0.08em"}},"Total Score"))
  ));
  const hrPlayers=(team.players||[]).filter(p=>p.type==="hr");

  const hrSec=h("div",{style:{marginBottom:"16px"}});
  hrSec.appendChild(h("div",{style:{color:C.red,fontSize:"11px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:"8px"}},"HR Players"));
  hrPlayers.length===0?hrSec.appendChild(h("div",{style:{color:C.muted,fontSize:"13px"}},"No players yet.")):hrPlayers.forEach(p=>{
    const row=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${C.border}22`,opacity:p.droppedAt?"0.55":"1"}});

    if(p.addedAt) nd.appendChild(h("span",{style:{color:C.green,fontSize:"11px",marginLeft:"6px"}},`(added ${fmtDate(p.addedAt)})`));
    const sd=h("div",{style:{display:"flex",alignItems:"center",gap:"8px"}});
    sd.appendChild(badge("HR",C.red));
    sd.appendChild(h("span",{style:{color:C.red,fontWeight:"800",fontSize:"20px",fontFamily:"'Bebas Neue', sans-serif",minWidth:"28px",textAlign:"right"}},p.effectiveHR||0));
    row.append(nd,sd); hrSec.appendChild(row);
  });
  modal.appendChild(hrSec);
  if(hbpPlayer){
    const hs=h("div",{style:{marginBottom:"16px"}});
    hs.appendChild(h("div",{style:{color:C.green,fontSize:"11px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:"8px"}},"HBP Player"));
    const row=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",opacity:hbpPlayer.droppedAt?"0.55":"1"}});
    const nd=h("div",{},playerName(hbpPlayer));
    if(hbpPlayer.droppedAt) nd.appendChild(h("span",{style:{color:C.muted,fontSize:"11px",marginLeft:"6px"}},`(dropped ${fmtDate(hbpPlayer.droppedAt)})`));
    if(hbpPlayer.addedAt) nd.appendChild(h("span",{style:{color:C.green,fontSize:"11px",marginLeft:"6px"}},`(added ${fmtDate(hbpPlayer.addedAt)})`));
    const sd=h("div",{style:{display:"flex",alignItems:"center",gap:"8px"}});
    sd.appendChild(badge("HBP",C.green));
    sd.appendChild(h("span",{style:{color:C.green,fontWeight:"800",fontSize:"20px",fontFamily:"'Bebas Neue', sans-serif",minWidth:"28px",textAlign:"right"}},hbpPlayer.effectiveHBP||0));
    row.append(nd,sd); hs.appendChild(row); modal.appendChild(hs);
  }
  if(team.hasUsedTransaction) modal.appendChild(h("div",{style:{padding:"10px 14px",background:`${C.accent}11`,border:`1px solid ${C.accent}33`,borderRadius:"8px",fontSize:"12px",color:C.muted,marginBottom:"16px"}},"⚡ Transaction used - roster locked"));
  modal.appendChild(h("button",{style:{width:"100%",padding:"10px",background:"transparent",border:`1px solid ${C.border}`,borderRadius:"8px",color:C.muted,cursor:"pointer",fontSize:"14px"},onClick:()=>set({selectedTeam:null})},"Close"));
  overlay.appendChild(modal);
  return overlay;
}

// ── Commissioner Panel ────────────────────────────────────────────────────────
function buildCommish() {
  const local = S.cpLocal;
  const team = local[S.cpActive];
  const overlay = h("div",{style:{position:"fixed",inset:"0",background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"flex-start",justifyContent:"center",zIndex:"1000",padding:"16px",overflowY:"auto"}});
  const panel = h("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:"16px",padding:"28px",maxWidth:"620px",width:"100%",marginTop:"20px",marginBottom:"20px"}});
  panel.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"20px"}},
    h("h2",{style:{color:C.accent,fontSize:"20px",fontWeight:"800",margin:"0"}},"⚙️ Commissioner Panel"),
    h("button",{style:{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:"22px"},onClick:()=>set({showCommish:false})},"✕")
  ));
  // Team tabs
  const tabs=h("div",{style:{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"20px"}});
  local.forEach((t,i)=>tabs.appendChild(h("button",{style:{padding:"5px 12px",borderRadius:"6px",fontSize:"12px",fontWeight:"600",cursor:"pointer",background:S.cpActive===i?C.accent:C.bg,color:S.cpActive===i?"#000":C.muted,border:`1px solid ${S.cpActive===i?C.accent:C.border}`},onClick:()=>set({cpActive:i,cpReplHR:"",cpReplHBP:""})},t.name||`Team ${i+1}`)));
  panel.appendChild(tabs);
  // Name/owner
  const inp=(val,onInput,ph="",disabled=false)=>{
    const e=h("input",{type:"text",placeholder:ph,style:{background:C.bg,border:`1px solid ${C.border}`,borderRadius:"6px",padding:"7px 10px",color:C.text,fontSize:"13px",width:"100%",boxSizing:"border-box",outline:"none",opacity:disabled?"0.5":"1"}});
    e.value=val; e.disabled=disabled; e.addEventListener("input",ev=>onInput(ev.target.value)); return e;
  };
  const fields=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"16px"}});
  const nf=h("div"); nf.appendChild(h("label",{style:{color:C.muted,fontSize:"11px",textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:"4px"}},"Team Name")); nf.appendChild(inp(team.name,v=>{local[S.cpActive].name=v;set({cpLocal:local})}));
  const of=h("div"); of.appendChild(h("label",{style:{color:C.muted,fontSize:"11px",textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:"4px"}},"Owner")); of.appendChild(inp(team.owner,v=>{local[S.cpActive].owner=v;set({cpLocal:local})},"Owner"));
  fields.append(nf,of); panel.appendChild(fields);
  // HR Players
  const hrSec=h("div",{style:{marginBottom:"12px"}});
  hrSec.appendChild(h("div",{style:{color:C.red,fontSize:"11px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:"8px"}},"HR Players (7)"));
  const hrPlayers=team.players.filter(p=>p.type==="hr");
  hrPlayers.forEach((p,ri)=>{
    const absIdx=team.players.indexOf(p);
    const row=h("div",{style:{display:"flex",gap:"8px",alignItems:"center",marginBottom:"8px"}});
    const ni=inp(p.name,v=>{local[S.cpActive].players[absIdx].name=v;set({cpLocal:local})},`HR Player ${ri+1}`,!!p.droppedAt);
    ni.style.flex="1"; row.appendChild(ni);
    row.appendChild(h("span",{style:{color:C.red,fontSize:"12px",fontWeight:"700",minWidth:"38px",textAlign:"center"}},`${p.effectiveHR??0} HR`));
    if(!team.hasUsedTransaction&&!p.droppedAt) row.appendChild(h("button",{style:{padding:"4px 8px",fontSize:"11px",borderRadius:"4px",cursor:"pointer",background:"#e84a4a22",border:"1px solid #e84a4a44",color:C.red,whiteSpace:"nowrap"},onClick:()=>{const today=new Date().toISOString().split("T")[0];local[S.cpActive].players[absIdx].droppedAt=today;local[S.cpActive].hasUsedTransaction=true;set({cpLocal:local});}},"Drop"));
    if(p.droppedAt) row.appendChild(h("span",{style:{fontSize:"11px",color:C.muted,whiteSpace:"nowrap"}},"dropped"));
    if(p.addedAt) row.appendChild(h("span",{style:{fontSize:"11px",color:C.green,whiteSpace:"nowrap"}},"added"));
    hrSec.appendChild(row);
  });
  const drHR=hrPlayers.some(p=>p.droppedAt), addHR=team.players.some(p=>p.type==="hr"&&p.addedAt);
  if(drHR&&!addHR){
    const rs=h("div",{style:{marginTop:"8px"}});
    rs.appendChild(h("div",{style:{color:C.green,fontSize:"11px",fontWeight:"700",marginBottom:"6px"}},"Add Replacement HR Player"));
    const rr=h("div",{style:{display:"flex",gap:"8px"}});
    const ri=inp(S.cpReplHR,v=>set({cpReplHR:v}),"New player name"); ri.style.flex="1"; rr.appendChild(ri);
    rr.appendChild(h("button",{style:{padding:"7px 14px",borderRadius:"6px",cursor:"pointer",background:C.green+"22",border:`1px solid ${C.green}44`,color:C.green,fontSize:"12px",fontWeight:"700",whiteSpace:"nowrap"},onClick:()=>{const name=S.cpReplHR.trim();if(!name)return;const today=new Date().toISOString().split("T")[0];local[S.cpActive].players.push({name,type:"hr",droppedAt:null,addedAt:today,rawHR:0,effectiveHR:0,hrBaseline:null,teamAbbr:null});set({cpLocal:local,cpReplHR:""});}},"Add"));
    rs.appendChild(rr); hrSec.appendChild(rs);
  }
  panel.appendChild(hrSec);
  // HBP
  const hbpSec=h("div",{style:{marginBottom:"20px"}});
  hbpSec.appendChild(h("div",{style:{color:C.green,fontSize:"11px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:"8px"}},"HBP Player (1)"));
  const hbpP=team.players.find(p=>p.type==="hbp");
  if(hbpP){
    const absIdx=team.players.indexOf(hbpP);
    const row=h("div",{style:{display:"flex",gap:"8px",alignItems:"center"}});
    const hi=inp(hbpP.name,v=>{local[S.cpActive].players[absIdx].name=v;set({cpLocal:local})},"HBP Player",!!hbpP.droppedAt);
    hi.style.flex="1"; row.appendChild(hi);
    row.appendChild(h("span",{style:{color:C.green,fontSize:"12px",fontWeight:"700",minWidth:"44px",textAlign:"center"}},`${hbpP.effectiveHBP??0} HBP`));
    if(!team.hasUsedTransaction&&!hbpP.droppedAt) row.appendChild(h("button",{style:{padding:"4px 8px",fontSize:"11px",borderRadius:"4px",cursor:"pointer",background:"#e84a4a22",border:"1px solid #e84a4a44",color:C.red,whiteSpace:"nowrap"},onClick:()=>{const today=new Date().toISOString().split("T")[0];local[S.cpActive].players[absIdx].droppedAt=today;local[S.cpActive].hasUsedTransaction=true;set({cpLocal:local});}},"Drop"));
    if(hbpP.droppedAt) row.appendChild(h("span",{style:{fontSize:"11px",color:C.muted,whiteSpace:"nowrap"}},"dropped"));
    hbpSec.appendChild(row);
  }
  const drHBP=!!hbpP?.droppedAt, addHBP=team.players.some(p=>p.type==="hbp"&&p.addedAt);
  if(drHBP&&!addHBP){
    const rs=h("div",{style:{marginTop:"8px"}});
    rs.appendChild(h("div",{style:{color:C.green,fontSize:"11px",fontWeight:"700",marginBottom:"6px"}},"Add Replacement HBP Player"));
    const rr=h("div",{style:{display:"flex",gap:"8px"}});
    const ri=inp(S.cpReplHBP,v=>set({cpReplHBP:v}),"New player name"); ri.style.flex="1"; rr.appendChild(ri);
    rr.appendChild(h("button",{style:{padding:"7px 14px",borderRadius:"6px",cursor:"pointer",background:C.green+"22",border:`1px solid ${C.green}44`,color:C.green,fontSize:"12px",fontWeight:"700",whiteSpace:"nowrap"},onClick:()=>{const name=S.cpReplHBP.trim();if(!name)return;const today=new Date().toISOString().split("T")[0];local[S.cpActive].players.push({name,type:"hbp",droppedAt:null,addedAt:today,rawHBP:0,effectiveHBP:0,hbpBaseline:null,teamAbbr:null});set({cpLocal:local,cpReplHBP:""});}},"Add"));
    rs.appendChild(rr); hbpSec.appendChild(rs);
  }
  panel.appendChild(hbpSec);
  // Actions
  if(S.cpStatus) panel.appendChild(h("div",{style:{color:C.green,fontSize:"13px",marginBottom:"12px"}},S.cpStatus));
  const actions=h("div",{style:{display:"flex",gap:"10px",flexWrap:"wrap",alignItems:"center"}});
  actions.appendChild(h("button",{style:{padding:"10px 18px",borderRadius:"8px",cursor:"pointer",fontWeight:"700",fontSize:"13px",background:`${C.accent}22`,border:`1px solid ${C.accent}55`,color:C.accent,opacity:S.cpRefreshing?"0.6":"1"},onClick:async()=>{
    set({cpRefreshing:true,cpStatus:"Fetching live MLB stats..."});
    const updated=JSON.parse(JSON.stringify(local));
    for(const t of updated){for(const p of t.players){if(!p.name?.trim())continue;const s=await fetchStats(p.name);if(!s)continue;if(p.type==="hr"&&!p.droppedAt){if(p.addedAt){if(p.hrBaseline===null)p.hrBaseline=s.hr;p.effectiveHR=Math.max(0,s.hr-p.hrBaseline);}else p.effectiveHR=s.hr;}if(p.type==="hbp"&&!p.droppedAt){if(p.addedAt){if(p.hbpBaseline===null)p.hbpBaseline=s.hbp;p.effectiveHBP=Math.max(0,s.hbp-p.hbpBaseline);}else p.effectiveHBP=s.hbp;}if(s.teamAbbr)p.teamAbbr=s.teamAbbr;}}
    set({cpLocal:updated,cpRefreshing:false,cpStatus:"OK Stats updated!"});
    setTimeout(()=>set({cpStatus:""}),3000);
  }},S.cpRefreshing?"Refresh Refreshing...":"Refresh Refresh Live Stats"));
  actions.appendChild(h("button",{style:{padding:"10px 18px",borderRadius:"8px",cursor:"pointer",fontWeight:"700",fontSize:"13px",background:C.accent,border:"none",color:"#000"},onClick:async()=>{await saveToFirebase(local);set({cpStatus:"OK Saved!"});setTimeout(()=>set({cpStatus:""}),2000);}},  "💾 Save"));
  panel.appendChild(actions);
  overlay.appendChild(panel);
  return overlay;
}

// ── Main render ───────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  app.innerHTML="";

  // Header
  const header=h("div",{style:{background:`linear-gradient(135deg,${C.surface} 0%,#0d1729 100%)`,borderBottom:`1px solid ${C.border}`,padding:"env(safe-area-inset-top, 20px) 20px 16px",paddingTop:"max(env(safe-area-inset-top), 20px)"}});
  const hInner=h("div",{style:{maxWidth:"640px",margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:"12px"}});
  const titleBlock=h("div",{},
    h("div",{style:{fontFamily:"'Bebas Neue', sans-serif",fontSize:"38px",letterSpacing:"0.05em",color:C.accent,lineHeight:"1"}},"⚾ DINGERS ONLY"),
    h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginTop:"10px"}},
      h("button",{style:{padding:"6px 14px",borderRadius:"6px",cursor:"pointer",fontWeight:"700",fontSize:"12px",background:`${C.accent}22`,border:`1px solid ${C.accent}55`,color:C.accent,opacity:S.refreshing?"0.6":"1"},onClick:refreshAllStats},S.refreshing?"Refresh Refreshing...":"Refresh Refresh Stats"),
      S.refreshStatus?h("span",{style:{color:C.green,fontSize:"12px"}},S.refreshStatus):S.lastUpdated?h("span",{style:{color:C.muted,fontSize:"11px"}},`Updated ${fmtTime(S.lastUpdated)}`):null
    )
  );
  const authBlock=h("div",{style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"6px"}});
  if(!S.commishUnlocked){
    const pwRow=h("div",{style:{display:"flex",gap:"6px",alignItems:"center"}});
    const pwInp=h("input",{type:"password",placeholder:"Commissioner PIN",style:{background:C.bg,border:`1px solid ${S.pwError?C.red:C.border}`,borderRadius:"6px",padding:"7px 10px",color:C.text,fontSize:"13px",outline:"none",width:"155px"}});
    pwInp.value=S.commishInput;
    pwInp.addEventListener("input",e=>set({commishInput:e.target.value,pwError:false}));
    pwInp.addEventListener("keydown",e=>{if(e.key==="Enter")handleLogin();});
    pwRow.append(pwInp,h("button",{style:{padding:"7px 12px",borderRadius:"6px",cursor:"pointer",background:C.accent,border:"none",color:"#000",fontWeight:"700",fontSize:"13px"},onClick:handleLogin},"Enter"));
    authBlock.appendChild(pwRow);
    if(S.pwError) authBlock.appendChild(h("span",{style:{color:C.red,fontSize:"12px"}},"Incorrect password"));
  } else {
    authBlock.appendChild(h("button",{style:{padding:"7px 14px",borderRadius:"6px",cursor:"pointer",background:C.accent,border:"none",color:"#000",fontWeight:"700",fontSize:"13px"},onClick:()=>{set({showCommish:true,cpLocal:JSON.parse(JSON.stringify(S.teams)),cpActive:0});}},"⚙️ Manage League"));
  }
  hInner.append(titleBlock,authBlock);
  header.appendChild(hInner);
  app.appendChild(header);

  // Tabs
  const tabs=[{id:"standings",label:"🏆 Standings"},{id:"rosters",label:"📋 Rosters"},{id:"leaderboard",label:"📊 Leaderboard"},{id:"projected",label:"🔮 Projected"},{id:"scores",label:"⚾ Scores"},{id:"recent",label:"📅 Recent"},{id:"history",label:"📈 History"},{id:"rules",label:"📖 Rules"},...(S.commishUnlocked?[{id:"debug",label:"🔍 Debug"}]:[])];
  const tabBar=h("div",{style:{borderBottom:`1px solid ${C.border}`,background:C.surface}});
  const tabInner=h("div",{style:{maxWidth:"640px",margin:"0 auto",display:"flex",padding:"0 16px",overflowX:"auto"}});
  tabs.forEach(tab=>{
    const active=S.tab===tab.id;
    tabInner.appendChild(h("button",{class:"tab-btn",style:{padding:"13px 16px",background:"none",border:"none",borderBottom:active?`2px solid ${C.accent}`:"2px solid transparent",color:active?C.accent:C.muted,fontWeight:active?"700":"500",fontSize:"13px",cursor:"pointer",whiteSpace:"nowrap"},onClick:()=>set({tab:tab.id})},tab.label));
  });
  tabBar.appendChild(tabInner);
  app.appendChild(tabBar);

  // Body
  const body=h("div",{style:{maxWidth:"640px",margin:"0 auto",padding:"24px 16px"}});
  if(S.tab==="standings") body.appendChild(buildStandings());
  else if(S.tab==="rosters") body.appendChild(buildRosters());
  else if(S.tab==="leaderboard") body.appendChild(buildLeaderboard());
  else if(S.tab==="projected") body.appendChild(buildProjected());
  else if(S.tab==="scores") body.appendChild(buildScores());
  else if(S.tab==="recent") body.appendChild(buildRecent());
  else if(S.tab==="history") body.appendChild(buildHistory());
  else if(S.tab==="rules") body.appendChild(buildRules());
  else if(S.tab==="debug") body.appendChild(buildDebug());
  app.appendChild(body);

  if(S.selectedTeam) app.appendChild(buildTeamModal(S.selectedTeam));
  if(S.spotlightPlayer) app.appendChild(buildSpotlightModal());
  if(S.projectedTeam) app.appendChild(buildProjectedTeamModal());
  if(S.showCommish&&S.cpLocal) app.appendChild(buildCommish());
}

function handleLogin() {
  if(S.commishInput===PASS){ set({commishUnlocked:true,showCommish:true,pwError:false,cpLocal:JSON.parse(JSON.stringify(S.teams)),cpActive:0}); }
  else set({pwError:true});
}

try { render(); } catch(e) { console.error("Initial render error:", e); document.getElementById("app").innerHTML = `<div style="color:#f5c842;padding:20px;font-family:monospace;font-size:12px;background:#0a0f1e;min-height:100vh">Render error: ${e.message}<br><br><pre style="white-space:pre-wrap">${e.stack}</pre></div>`; }
setInterval(() => { if(S.tab === "rules") render(); }, 60000);

</script>
