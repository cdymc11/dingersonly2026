<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Dingers Only"/>
  <title>Dingers Only 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0a0f1e; font-family: 'DM Sans', sans-serif; color: #f0f4ff; }
    #app { min-height: 100vh; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    input { font-family: 'DM Sans', sans-serif; }
    button { font-family: 'DM Sans', sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0f1e; }
    ::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 3px; }
    input::placeholder { color: #6b7fa3; }
    .tab-btn { transition: all 0.15s; }
    .row-hover:hover { background: rgba(232,200,74,0.09) !important; }

    #splash-screen {
      position: fixed; inset: 0; background: #080c12;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.6s ease;
    }
    #splash-screen.fade-out { opacity: 0; pointer-events: none; }
    .splash-title {
      text-align: center;
      animation: splashUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.2s both;
    }
    @keyframes splashUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .splash-main {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 56px; letter-spacing: 0.06em;
      color: #e8c84a; line-height: 1;
    }
    .splash-sub {
      font-size: 13px; letter-spacing: 0.25em;
      text-transform: uppercase; color: #6b7fa3;
      margin-top: 6px;
    }
    .splash-batter {
      margin-top: 20px;
      animation: splashBatterIn 0.5s ease 0.8s both;
    }
    @keyframes splashBatterIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }
    </style>
</head>

    const now = new Date();
    const weekLabel = label || `Week of ${now.toLocaleDateString("en-US",{month:"short",day:"numeric"})}`;
    const docId = now.toISOString().split("T")[0]; // YYYY-MM-DD as doc ID
    const snapshot = S.teams.map(t => ({
      id: t.id,
      name: t.name,
      owner: t.owner || "",
      score: score(t),
    })).sort((a,b) => b.score - a.score);
    await setDoc(doc(db,"history",docId), { label: weekLabel, date: docId, standings: snapshot });
    return true;
  } catch(e) {
    console.error("History save failed:", e);
    return false;
  }
}

// Load all history snapshots from Firebase
async function loadHistory() {
  set({historyLoading: true});
  try {
    const q = query(historyCol, orderBy("date","asc"));
    const snap = await getDocs(q);
    const weeks = snap.docs.map(d => d.data());
    set({historyWeeks: weeks, historyLoading: false, historyWeekIdx: weeks.length - 1});
  } catch(e) {
    set({historyWeeks: [], historyLoading: false});
  }
}

// Auto-snapshot every Monday — checks once on load
function maybeAutoSnapshot() {
  const now = new Date();
  // Daily snapshot — runs every day
  const todayStr = now.toISOString().split("T")[0];
  const lastSnap = localStorage.getItem("lastHistorySnap");
  if(lastSnap === todayStr) return; // already snapped today
  // Wait until stats are loaded (give it 5s after firebase sync)
  setTimeout(async () => {
    if(S.teams && S.teams.some(t => score(t) > 0)) {
      const ok = await saveHistorySnapshot();
      if(ok) localStorage.setItem("lastHistorySnap", todayStr);
    }
  }, 5000);
}

async function fetchStats(name) {
  try {
    let playerId = PLAYER_IDS[name] || null;
    if (!playerId) {
      const r = await fetch(`https://statsapi.mlb.com/api/v1/people/search?names=${encodeURIComponent(name)}&sportId=1`);
      if (!r.ok) return null;
      const d = await r.json();
      const person = d.people?.[0]; if(!person) return null;
      playerId = person.id;
    }
    const season = new Date().getFullYear();
    const r2 = await fetch(`https://statsapi.mlb.com/api/v1/people/${playerId}/stats?stats=season&group=hitting&season=${season}&sportId=1`);
    if (!r2.ok) return { hr: 0, hbp: 0, playerId, teamAbbr: null };
    const d2 = await r2.json();
    const split = d2.stats?.[0]?.splits?.[0];
    // No splits = player found but no stats yet (0 games played) — return zeros
    return { hr: split?.stat?.homeRuns??0, hbp: split?.stat?.hitByPitch??0, playerId, teamAbbr: split?.team?.abbreviation??null };
  } catch { return null; }
}

async function fetchYesterday(playerId) {
  try {
    const y = new Date(); y.setDate(y.getDate()-1);
    const ds = y.toISOString().split("T")[0];
    const season = new Date().getFullYear();
    const r = await fetch(`https://statsapi.mlb.com/api/v1/people/${playerId}/stats?stats=gameLog&group=hitting&season=${season}&startDate=${ds}&endDate=${ds}&sportId=1`);
    const d = await r.json();
    const stat = d.stats?.[0]?.splits?.[0]?.stat; if(!stat) return null;
    return { hr: stat.homeRuns??0, hbp: stat.hitByPitch??0 };
  } catch { return null; }
}

// Correct known misspellings from old Firebase data
const NAME_CORRECTIONS = {
  "Joe Adell": "Jo Adell",
  "Caleb Durin": "Caleb Durbin",
};

// Listen to Firebase for real-time updates
// We always use HARDCODED_TEAMS for names/structure, but merge saved stats on top
onSnapshot(leagueRef, snap => {
  if(snap.exists()) {
    const data = snap.data();
    if(data.teams?.length > 0) {
      // Build a lookup of saved player stats keyed by player ID or position
      const merged = JSON.parse(JSON.stringify(HARDCODED_TEAMS));
      merged.forEach(team => {
        const saved = data.teams.find(t => t.id === team.id);
        if(!saved) return;
        // Copy transaction/stat fields from saved team
        team.hasUsedTransaction = saved.hasUsedTransaction || false;
        // Match players by index (same draft order), copy stats over
        team.players.forEach((p, i) => {
          const sp = saved.players?.[i];
          if(!sp) return;
          if(p.type === "hr") {
            p.effectiveHR = sp.effectiveHR || 0;
            p.hrBaseline = sp.hrBaseline ?? null;
            p.droppedAt = sp.droppedAt || null;
            p.addedAt = sp.addedAt || null;
            if(sp.teamAbbr) p.teamAbbr = sp.teamAbbr;
          }
          if(p.type === "hbp") {
            p.effectiveHBP = sp.effectiveHBP || 0;
            p.hbpBaseline = sp.hbpBaseline ?? null;
            p.droppedAt = sp.droppedAt || null;
            p.addedAt = sp.addedAt || null;
            if(sp.teamAbbr) p.teamAbbr = sp.teamAbbr;
          }
        });
        // Also append any added (transaction) players beyond the base 8
        if(saved.players?.length > team.players.length) {
          const extra = saved.players.slice(team.players.length);
          extra.forEach(ep => {
            ep.name = NAME_CORRECTIONS[ep.name] || ep.name;
            team.players.push(ep);
          });
        }
      });
      set({ teams: merged, lastUpdated: data.lastUpdated||null });
      maybeAutoSnapshot();
    }
  }
});

async function saveToFirebase(teams) {
  const now = new Date().toISOString();
  // Always enforce hardcoded team names before saving
  const corrected = teams.map(t => {
    const hc = HARDCODED_TEAMS.find(h => h.id === t.id);
    return hc ? { ...t, name: hc.name, owner: hc.owner } : t;
  });
  await setDoc(leagueRef, { teams: corrected, lastUpdated: now });
  set({ teams: corrected, lastUpdated: now });
}

// ── MLB Stats refresh ─────────────────────────────────────────────────────────
async function refreshAllStats() {
  set({ refreshing: true, refreshStatus: "Fetching stats…" });
  const updated = JSON.parse(JSON.stringify(S.teams));
  for(const t of updated) {
    for(const p of t.players) {
      if(!p.name?.trim()) continue;
      const s = await fetchStats(p.name); if(!s) continue;
      if(p.type==="hr" && !p.droppedAt) {
        if(p.addedAt){ if(p.hrBaseline===null) p.hrBaseline=s.hr; p.effectiveHR=Math.max(0,s.hr-p.hrBaseline); }
        else p.effectiveHR=s.hr;
      }
      if(p.type==="hbp" && !p.droppedAt) {
        if(p.addedAt){ if(p.hbpBaseline===null) p.hbpBaseline=s.hbp; p.effectiveHBP=Math.max(0,s.hbp-p.hbpBaseline); }
        else p.effectiveHBP=s.hbp;
      }
      if(s.teamAbbr) p.teamAbbr=s.teamAbbr;
    }
  }
  await saveToFirebase(updated);
  set({ refreshing: false, refreshStatus: "✓ Updated!" });
  setTimeout(()=>set({refreshStatus:""}), 3000);
}

// ── Render ────────────────────────────────────────────────────────────────────
function h(tag, attrs={}, ...children) {
  const e = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)) {
    if(k==="style"&&typeof v==="object") Object.assign(e.style,v);
    else if(k.startsWith("on")&&typeof v==="function") e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="class") e.className=v;
    else if(k==="disabled"){ if(v) e.disabled=true; }
    else e.setAttribute(k,v);
  }
  for(const c of children) {
    if(c==null||c===false) continue;
    if(c instanceof Node) e.appendChild(c);
    else e.appendChild(document.createTextNode(String(c)));
  }
  return e;
}

// ── Rank info builder (tie-aware) ─────────────────────────────────────────────
function buildRankInfo(scores) {
  const n = scores.length;
  const result = scores.map(() => ({ icon: "", isSpecial: false }));
  if(n === 0) return result;
  const distinct = [...new Set(scores)].sort((a,b)=>b-a);
  const highest = distinct[0];
  const lowest = distinct[distinct.length - 1];
  const secondDistinct = distinct.length > 1 ? distinct[1] : null;
  scores.forEach((s, i) => {
    if(s === highest) {
      result[i] = { icon: "🥇", isSpecial: true };
    } else if(s === lowest || (secondDistinct !== null && s === secondDistinct)) {
      result[i] = { icon: "💀", isSpecial: true };
    } else {
      const rank = distinct.indexOf(s) + 1;
      result[i] = { icon: `#${rank}`, isSpecial: false };
    }
  });
  return result;
}

function buildStandings() {
  const sorted = [...S.teams].sort((a,b)=>score(b)-score(a));
  const scores = sorted.map(t=>score(t));
  const rankInfo = buildRankInfo(scores);
  function rankIcon(i) { return rankInfo[i].icon; }
  function rankSize(i) { return rankInfo[i].isSpecial ? "20px" : "14px"; }
  const wrap = h("div",{style:{animation:"fadeIn 0.4s ease"}});
  const hdr = h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}},
    h("h3",{style:{margin:"0",fontSize:"13px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.12em",color:C.muted}},"Standings"),
    h("span",{style:{fontSize:"11px",color:C.muted}},"Tap a team for roster")
  );
  wrap.appendChild(hdr);
  const maxScore = Math.max(...sorted.map(t=>score(t)),1);
  const table = h("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:"12px",overflow:"hidden",marginBottom:"20px"}});
  table.appendChild(h("div",{style:{display:"grid",gridTemplateColumns:"40px 1fr 60px",padding:"10px 20px",borderBottom:`1px solid ${C.border}`,background:C.surface}},
    h("span",{style:{color:C.muted,fontSize:"11px",textTransform:"uppercase",letterSpacing:"0.08em"}},"#"),
    h("span",{style:{color:C.muted,fontSize:"11px",textTransform:"uppercase",letterSpacing:"0.08em"}},"Team"),
    h("span",{style:{color:C.muted,fontSize:"11px",textTransform:"uppercase",letterSpacing:"0.08em",textAlign:"right"}},"PTS")
  ));
  sorted.forEach((team,i)=>{
    const teamScore = score(team);
    const pct = (teamScore/maxScore)*100;
    const wrapper = h("div",{style:{borderBottom:i<sorted.length-1?`1px solid ${C.border}`:"none",background:i===0?`${C.accent}11`:"transparent",transition:"background 0.15s",cursor:"pointer"},onClick:()=>set({selectedTeam:team})});
    wrapper.classList.add("row-hover");
    const row = h("div",{style:{display:"grid",gridTemplateColumns:"40px 1fr 60px",alignItems:"center",padding:"14px 20px 8px"}},
      h("span",{style:{fontSize:rankSize(i),color:C.muted,fontWeight:"700"}}, rankIcon(i)),
      h("div",{},
        h("div",{style:{color:C.text,fontWeight:"600",fontSize:"15px"}},team.name),
        team.owner?h("div",{style:{color:C.muted,fontSize:"11px"}},team.owner):null
      ),
      h("span",{style:{color:C.accent,fontWeight:"800",fontSize:"22px",textAlign:"right",fontFamily:"'Bebas Neue', sans-serif"}},teamScore)
    );
    const barWrap = h("div",{style:{margin:"0 20px 10px",height:"4px",background:C.bg,borderRadius:"2px",overflow:"hidden"}});
    barWrap.appendChild(h("div",{style:{height:"100%",width:`${pct}%`,background:i===0?`linear-gradient(90deg,${C.accent},${C.red})`:`${C.accent}66`,borderRadius:"2px",transition:"width 0.6s ease"}}));
    wrapper.append(row, barWrap);
    table.appendChild(wrapper);
  });
  wrap.appendChild(table);
  const leg = h("div",{style:{display:"flex",gap:"16px",fontSize:"12px",color:C.muted,flexWrap:"wrap"}});
  const hrL=h("span"); hrL.appendChild(badge("HR",C.red)); hrL.appendChild(document.createTextNode(" = Home Run"));
  const hbpL=h("span"); hbpL.appendChild(badge("HBP",C.green)); hbpL.appendChild(document.createTextNode(" = Hit By Pitch"));
  leg.append(hrL,hbpL,h("span",{style:{marginLeft:"auto"}},"PTS = HRs + HBPs"));
  wrap.appendChild(leg);
  return wrap;
}

function buildLeaderboard() {
  const filter = S.lbFilter || "pts";
  const wrap = h("div",{style:{animation:"fadeIn 0.4s ease"}});
  const filterRow = h("div",{style:{display:"flex",gap:"8px",marginBottom:"16px"}});
  [["pts","Total"],["hr","HR Only"],["hbp","HBP Only"]].forEach(([id,lbl])=>{
    const active = filter===id;
    filterRow.appendChild(h("button",{
      style:{flex:"1",padding:"7px 4px",borderRadius:"8px",cursor:"pointer",fontSize:"12px",fontWeight:"700",
        background:active?C.accent:"transparent",
        border:`1px solid ${active?C.accent:C.border}`,
        color:active?"#000":C.muted},
      onClick:()=>set({lbFilter:id})
    },lbl));
  });
  wrap.appendChild(filterRow);
  const all=[];
  S.teams.forEach(team=>(team.players||[]).filter(p=>p.name?.trim()).forEach(p=>{
    const pts = p.type==="hr" ? (p.effectiveHR||0) : (p.effectiveHBP||0);
    all.push({name:p.name, teamAbbr:p.teamAbbr, pts, type:p.type, fantasyTeam:team.name, dropped:!!p.droppedAt, added:!!p.addedAt});
  }));
  let filtered, title, statLabel;
  if(filter==="pts") {
    filtered = [...all].sort((a,b)=>b.pts-a.pts).slice(0,20);
    title = "Top 20 · Total Points"; statLabel = null;
  } else if(filter==="hr") {
    filtered = [...all].filter(p=>p.type==="hr").sort((a,b)=>b.pts-a.pts).slice(0,20);
    title = "Top 20 · Home Runs"; statLabel = "HR";
  } else {
    filtered = [...all].filter(p=>p.type==="hbp").sort((a,b)=>b.pts-a.pts);
    title = "All 8 HBP Players · Ranked"; statLabel = "HBP";
  }
  if(filtered.length > 0) {
    const maxP = Math.max(...filtered.map(p=>p.pts),1);
    wrap.appendChild(h("div",{style:{color:C.muted,fontSize:"11px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"10px"}},title));
    const plist = h("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:"12px",overflow:"hidden"}});
    filtered.forEach((p,i)=>{
      const color = p.type==="hr" ? C.red : C.green;

      const nameWrap = h("span",{style:{color:p.dropped?C.muted:C.text,fontSize:"14px",fontWeight:"600"}},p.name);
      if(p.teamAbbr) nameWrap.appendChild(h("span",{style:{color:C.muted,fontWeight:"400"}},` (${p.teamAbbr})`));
      if(p.dropped) nameWrap.appendChild(h("span",{style:{fontSize:"10px",marginLeft:"5px",color:C.muted}},"(dropped)"));
      if(p.added) nameWrap.appendChild(h("span",{style:{fontSize:"10px",marginLeft:"5px",color:C.green}},"(added)"));
      const right = h("div",{style:{display:"flex",alignItems:"center",gap:"8px"}});
      right.appendChild(h("span",{style:{color:C.muted,fontSize:"10px",textTransform:"uppercase",fontWeight:"600"}},statLabel||(p.type==="hr"?"HR":"HBP")));
      right.appendChild(h("span",{style:{color,fontFamily:"'Bebas Neue', sans-serif",fontSize:"24px",fontWeight:"800"}},p.pts));
      tr.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:"10px"}},

        h("div",{},nameWrap,h("div",{style:{color:C.muted,fontSize:"11px"}},p.fantasyTeam))
      ));
      tr.appendChild(right);

async function loadYesterday() {
  set({ydLoading:true,ydDone:false,ydResults:null});
  const hits=[];
  for(const team of S.teams) {
    for(const p of (team.players||[])) {
      if(!p.name?.trim()) continue;
      const s = await fetchStats(p.name); if(!s?.playerId) continue;
      const y = await fetchYesterday(s.playerId); if(!y) continue;
      if(p.type==="hr"&&y.hr>0) hits.push({name:p.name,teamAbbr:s.teamAbbr,fantasyTeam:team.name,stat:y.hr,type:"hr"});
      if(p.type==="hbp"&&y.hbp>0) hits.push({name:p.name,teamAbbr:s.teamAbbr,fantasyTeam:team.name,stat:y.hbp,type:"hbp"});
    }
  }
  hits.sort((a,b)=>b.stat-a.stat);
  set({ydLoading:false,ydDone:true,ydResults:hits});
}

async function loadWeeklyRecap(startDate, endDate) {
  set({wkLoading:true,wkDone:false,wkResults:null});
  const season = new Date().getFullYear();
  const teamWeeks = S.teams.map(t=>({id:t.id, name:t.name, hr:0, hbp:0, pts:0}));
  const allPlayers = [];
  try {
    for(const ft of S.teams) {
      const tw = teamWeeks.find(t=>t.id===ft.id);
      for(const p of (ft.players||[])) {
        if(!p.name?.trim()) continue;
        const playerId = PLAYER_IDS[p.name]; if(!playerId) continue;
        try {
          const r = await fetch(`https://statsapi.mlb.com/api/v1/people/${playerId}/stats?stats=gameLog&group=hitting&season=${season}&startDate=${startDate}&endDate=${endDate}&sportId=1`);
          if(!r.ok) continue;
          const d = await r.json();
          const splits = d.stats?.[0]?.splits||[];
          let hr=0,hbp=0;
          splits.forEach(s=>{ hr+=s.stat?.homeRuns??0; hbp+=s.stat?.hitByPitch??0; });
          const pts = p.type==="hr"?hr:hbp;
          if(p.type==="hr") tw.hr+=hr;
          if(p.type==="hbp") tw.hbp+=hbp;
          tw.pts+=pts;
          allPlayers.push({name:p.name,fantasyTeam:ft.name,type:p.type,pts,hr,hbp});
        } catch(e){continue;}
      }
    }
    const hrPlayers = allPlayers.filter(p=>p.type==="hr").sort((a,b)=>b.pts-a.pts);
    const hbpPlayers = allPlayers.filter(p=>p.type==="hbp").sort((a,b)=>b.pts-a.pts);
    const topTeam = [...teamWeeks].sort((a,b)=>b.pts-a.pts)[0];
    set({wkLoading:false,wkDone:true,wkResults:{
      teamWeeks, allPlayers,
      topHR: hrPlayers[0]?{name:hrPlayers[0].name,val:hrPlayers[0].pts}:null,
      topHBP: hbpPlayers[0]?{name:hbpPlayers[0].name,val:hbpPlayers[0].pts}:null,
      teamOfWeek: topTeam?{name:topTeam.name,pts:topTeam.pts}:null,
    }});
  } catch(e) {
    set({wkLoading:false,wkDone:true,wkResults:null});
  }
}

function buildProjected() {
  const TOTAL_GAMES = 162;
  const seasonStart = new Date("2026-03-26");
  const today = new Date();
  const daysPassed = Math.max(1, Math.floor((today - seasonStart) / (1000*60*60*24)));
  const gamesPlayed = Math.min(Math.round(daysPassed * 0.92), TOTAL_GAMES);
  const gamesRemaining = TOTAL_GAMES - gamesPlayed;
  // Weight: how much to trust actual pace vs preseason projection
  // Starts at 0.1 (10% pace, 90% preseason), reaches 0.9 by game 145
  const paceWeight = Math.min(0.9, gamesPlayed / TOTAL_GAMES * 1.6);
  const projWeight = 1 - paceWeight;

  const wrap = h("div",{style:{animation:"fadeIn 0.4s ease"}});
  wrap.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"4px"}},
    h("span",{style:{fontSize:"20px"}},"🔮"),
    h("h3",{style:{margin:"0",fontSize:"13px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.12em",color:C.muted}},"Projected Final Rankings")
  ));
  wrap.appendChild(h("div",{style:{color:C.muted,fontSize:"12px",marginBottom:"20px"}},"Blends preseason Steamer projections with current pace. Tap a team to see player breakdown."));

  const projTeams = S.teams.map(team => {
    const currentScore = score(team);
    let projectedScore = currentScore;

    (team.players||[]).forEach(p => {
      if(!p.name?.trim()) return;
      const preseason = PRESEASON_PROJ[p.name] ?? null;
      const actual = p.type==="hr" ? (p.effectiveHR||0) : (p.effectiveHBP||0);

      if(preseason === null) {
        // No preseason data — fall back to pure pace
        const rate = actual / Math.max(gamesPlayed, 1);
        projectedScore += rate * gamesRemaining;
      } else {
        // Blended: pace-based remaining + preseason-based remaining
        const paceRate = actual / Math.max(gamesPlayed, 1);
        const paceRemaining = paceRate * gamesRemaining;
        // Preseason remaining = full season proj - already earned at preseason rate
        const preseasonRate = preseason / TOTAL_GAMES;
        const preseasonRemaining = preseasonRate * gamesRemaining;
        // Blend
        projectedScore += (paceWeight * paceRemaining) + (projWeight * preseasonRemaining);
      }
    });

    const projRemaining = Math.round(projectedScore - currentScore);
    return { ...team, currentScore, gamesPlayed, gamesRemaining, projectedScore: Math.round(projectedScore), projRemaining };
  });

  const sorted = [...projTeams].sort((a,b)=>b.projectedScore-a.projectedScore);
  const maxProj = Math.max(...sorted.map(t=>t.projectedScore),1);
  const projRankInfo = buildRankInfo(sorted.map(t=>t.projectedScore));
  function rankIcon(i) { return projRankInfo[i].icon; }
  function rankSize(i) { return projRankInfo[i].isSpecial ? "20px" : "14px"; }

  // Season progress bar
  const progressPct = Math.round((gamesPlayed/TOTAL_GAMES)*100);
  const blendLabel = `${Math.round(projWeight*100)}% preseason · ${Math.round(paceWeight*100)}% pace`;
  wrap.appendChild(h("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:"10px",padding:"12px 16px",marginBottom:"20px"}},
    h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"11px",color:C.muted,marginBottom:"6px"}},
      h("span",{},`Game ${gamesPlayed} of ${TOTAL_GAMES}`),
      h("span",{},blendLabel)
    ),
    h("div",{style:{height:"4px",background:C.bg,borderRadius:"2px",overflow:"hidden"}},
      h("div",{style:{height:"100%",width:`${progressPct}%`,background:`linear-gradient(90deg,${C.accent},${C.red})`,borderRadius:"2px"}})
    )
  ));

  sorted.forEach((team,i)=>{
    const pct = (team.projectedScore/maxProj)*100;
    const isFirst = projRankInfo[i].icon === "🥇";
    const card = h("div",{class:"row-hover",style:{background:C.card,border:`1px solid ${isFirst?C.accent+"55":C.border}`,borderRadius:"12px",padding:"14px 18px",marginBottom:"10px",boxShadow:isFirst?`0 0 20px ${C.accent}18`:"none",cursor:"pointer"},onClick:()=>set({projectedTeam:{team, gamesPlayed, gamesRemaining, paceWeight, projWeight}})});
    const topRow = h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}});
    topRow.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:"10px"}},
      h("span",{style:{fontSize:rankSize(i),fontWeight:"700",color:C.muted,minWidth:"28px"}},rankIcon(i)),
      h("div",{},
        h("div",{style:{color:C.text,fontWeight:"700",fontSize:"15px"}},team.name),
        h("div",{style:{color:C.muted,fontSize:"11px"}},team.owner||"")
      )
    ));
    const rightCol = h("div",{style:{textAlign:"right"}});
    rightCol.appendChild(h("div",{style:{color:C.accent,fontFamily:"'Bebas Neue', sans-serif",fontSize:"28px",fontWeight:"800",lineHeight:"1"}},team.projectedScore));
    rightCol.appendChild(h("div",{style:{color:C.muted,fontSize:"10px",textTransform:"uppercase"}},"proj pts"));
    topRow.appendChild(rightCol);
    card.appendChild(topRow);
    const barWrap = h("div",{style:{height:"4px",background:C.bg,borderRadius:"2px",overflow:"hidden",marginBottom:"8px"}});
    barWrap.appendChild(h("div",{style:{height:"100%",width:`${pct}%`,background:i===0?`linear-gradient(90deg,${C.accent},${C.red})`:`${C.accent}55`,borderRadius:"2px",transition:"width 0.6s ease"}}));
    card.appendChild(barWrap);
    card.appendChild(h("div",{style:{display:"flex",gap:"16px",fontSize:"11px",color:C.muted}},
      h("span",{},`Now: ${team.currentScore} pts`),
      h("span",{},`+${team.projRemaining} projected`),
      h("span",{},`${team.gamesRemaining} games left`)
    ));
    wrap.appendChild(card);
  });

  wrap.appendChild(h("div",{style:{color:C.muted,fontSize:"11px",marginTop:"8px",textAlign:"center",lineHeight:"1.6"}},
    "Steamer 2026 preseason projections · Refresh Stats for latest actuals"
  ));
  return wrap;
}

  // Build set of all drafted teamAbbrs
  const draftedAbbrs = new Set();
  S.teams.forEach(ft => {
    const hcTeam = HARDCODED_TEAMS.find(h => h.id === ft.id);
    (ft.players||[]).forEach((p,i) => {
      const abbr = p.teamAbbr || hcTeam?.players?.[i]?.teamAbbr || null;
      if(abbr) draftedAbbrs.add(abbr);
    });
  });

  const wrap = h("div",{style:{animation:"fadeIn 0.4s ease"}});
  wrap.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"4px"}},

    h("h3",{style:{margin:"0",fontSize:"13px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.12em",color:C.muted}},"Today's Scores")
  ));

  wrap.appendChild(h("div",{style:{color:C.muted,fontSize:"11px",marginBottom:"20px"}},"🌟 = has drafted players · When games show Final, wait 1-2 hours then refresh stats!"));

  if(!S.scResults || S.scResults.length === 0) {
    wrap.appendChild(h("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:"12px",padding:"28px",textAlign:"center"}},

      const isLive = ["In Progress","Warmup","Pre-Game"].some(s => game.status?.includes(s)) || game.status === "Live";
      const statusColor = isFinal ? C.muted : isLive ? C.green : C.muted;
      const card = h("div",{style:{
        background: C.card,
        border: `1px solid ${hasDrafted ? C.accent+"55" : C.border}`,
        borderRadius:"10px",
        padding:"12px 16px",
        boxShadow: hasDrafted ? `0 0 12px ${C.accent}15` : "none"
      }});

      const top = h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}});
      // Star + status
      const statusEl = h("div",{style:{display:"flex",alignItems:"center",gap:"6px"}});
      if(hasDrafted) statusEl.appendChild(h("span",{style:{fontSize:"14px"}},"🌟"));
      statusEl.appendChild(h("span",{style:{color:statusColor,fontSize:"11px",fontWeight:"700",textTransform:"uppercase"}},
        isLive ? `🔴 ${game.inning || game.status}` : game.status
      ));
      if(isFinal) statusEl.appendChild(h("span",{style:{color:C.muted,fontSize:"10px",marginLeft:"6px"}},"· refresh stats in 1-2 hrs"));
      top.appendChild(statusEl);
      // Game time if not started
      if(!isFinal && !isLive && game.gameTime) {
        top.appendChild(h("span",{style:{color:C.muted,fontSize:"11px"}},game.gameTime));
      }
      card.appendChild(top);

      // Teams + scores
      const matchup = h("div",{style:{display:"grid",gridTemplateColumns:"1fr auto 1fr",alignItems:"center",gap:"8px"}});

      // Away team
      const awayHasDrafted = draftedAbbrs.has(game.awayAbbr);
      const awayEl = h("div",{style:{textAlign:"left"}});
      awayEl.appendChild(h("div",{style:{color:awayHasDrafted?C.accent:C.text,fontWeight:awayHasDrafted?"800":"600",fontSize:"16px"}},game.awayAbbr));
      awayEl.appendChild(h("div",{style:{color:C.muted,fontSize:"11px",marginTop:"2px"}},game.awayName));
      matchup.appendChild(awayEl);

      // Score or vs
      const scoreEl = h("div",{style:{textAlign:"center"}});
      if(isFinal || isLive) {
        scoreEl.appendChild(h("div",{style:{color:C.text,fontFamily:"'Bebas Neue', sans-serif",fontSize:"24px",fontWeight:"800",lineHeight:"1"}},
          `${game.awayScore} - ${game.homeScore}`
        ));
      } else {
        scoreEl.appendChild(h("div",{style:{color:C.muted,fontSize:"16px",fontWeight:"700"}},"vs"));
      }
      matchup.appendChild(scoreEl);

      // Home team
      const homeHasDrafted = draftedAbbrs.has(game.homeAbbr);
      const homeEl = h("div",{style:{textAlign:"right"}});
      homeEl.appendChild(h("div",{style:{color:homeHasDrafted?C.accent:C.text,fontWeight:homeHasDrafted?"800":"600",fontSize:"16px"}},game.homeAbbr));
      homeEl.appendChild(h("div",{style:{color:C.muted,fontSize:"11px",marginTop:"2px"}},game.homeName));
      matchup.appendChild(homeEl);
      card.appendChild(matchup);

      // Show which drafted players are in this game
      if(hasDrafted) {
        const draftedInGame = [];
        S.teams.forEach(ft => {
          const hcTeam = HARDCODED_TEAMS.find(hc => hc.id === ft.id);
          (ft.players||[]).forEach((p,i) => {
            const abbr = p.teamAbbr || hcTeam?.players?.[i]?.teamAbbr || null;
            if(abbr === game.awayAbbr || abbr === game.homeAbbr) {
              draftedInGame.push(`${p.name} (${ft.name})`);
            }
          });
        });
        if(draftedInGame.length > 0) {
          card.appendChild(h("div",{style:{color:C.muted,fontSize:"11px",marginTop:"8px",paddingTop:"8px",borderTop:`1px solid ${C.border}33`}},
            draftedInGame.join(" · ")
          ));
        }
      }
      list.appendChild(card);
    });
    wrap.appendChild(list);
  }

  wrap.appendChild(h("button",{style:{width:"100%",marginTop:"16px",padding:"10px",background:"transparent",border:`1px solid ${C.border}`,borderRadius:"8px",color:C.muted,cursor:"pointer",fontSize:"13px"},onClick:loadScores},"⟳ Refresh Scores"));
  return wrap;
}

async function loadScores() {

    const r = await fetch(`https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${today}&hydrate=linescore,team`);
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    const games = d.dates?.[0]?.games || [];
    console.log("Scores API sample game:", JSON.stringify(games[0], null, 2).slice(0, 800));

    // Hardcoded MLB team ID → abbreviation (these never change)

      108:"LAA",109:"ARI",110:"BAL",111:"BOS",112:"CHC",113:"CIN",114:"CLE",
      115:"COL",116:"DET",117:"HOU",118:"KC",119:"LAD",120:"WSH",121:"NYM",
      133:"ATH",134:"PIT",135:"SD",136:"SEA",137:"SF",138:"STL",139:"TB",
      140:"TEX",141:"TOR",142:"MIN",143:"PHI",144:"ATL",145:"CWS",146:"MIA",
      147:"NYY",158:"MIL"
    };
    const TEAM_NAME = {
      108:"Angels",109:"D-backs",110:"Orioles",111:"Red Sox",112:"Cubs",
      113:"Reds",114:"Guardians",115:"Rockies",116:"Tigers",117:"Astros",
      118:"Royals",119:"Dodgers",120:"Nationals",121:"Mets",133:"Athletics",
      134:"Pirates",135:"Padres",136:"Mariners",137:"Giants",138:"Cardinals",
      139:"Rays",140:"Rangers",141:"Blue Jays",142:"Twins",143:"Phillies",
      144:"Braves",145:"White Sox",146:"Marlins",147:"Yankees",158:"Brewers"
    };

    const results = games.map(g => {
      const awayId = g.teams?.away?.team?.id;

      const linescore = g.linescore;
      return {

      };

  } catch(e) {
    set({scLoading:false,scDone:true,scResults:[]});
  }
}

// ── Weekly Recap ──────────────────────────────────────────────────────────────
async function backfillHistory() {
  set({backfillRunning:true, backfillStatus:"Starting backfill…", backfillDone:false});
  const season = new Date().getFullYear();
  const seasonStart = new Date("2026-03-26");
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);

  // Build list of dates to backfill
  const dates = [];
  for(let d = new Date(seasonStart); d <= yesterday; d.setDate(d.getDate()+1)) {
    dates.push(d.toISOString().split("T")[0]);
  }

  // Check which dates already have snapshots
  let existingDates = new Set();
  try {
    const q = query(historyCol, orderBy("date","asc"));
    const snap = await getDocs(q);
    snap.docs.forEach(d => existingDates.add(d.data().date));
  } catch(e) {}

  const missing = dates.filter(d => !existingDates.has(d));
  set({backfillStatus:`Found ${missing.length} dates to backfill…`});

  if(missing.length === 0) {
    set({backfillRunning:false, backfillStatus:"Already up to date!", backfillDone:true});
    setTimeout(()=>set({backfillStatus:"",backfillDone:false}),4000);
    return;
  }

  let done = 0;
  for(const dateStr of missing) {
    try {
      set({backfillStatus:`Fetching ${dateStr} (${done+1}/${missing.length})…`});
      // Get cumulative stats for all players up to this date
      const teamScores = S.teams.map(t=>({id:t.id, name:t.name, owner:t.owner||"", score:0}));

      for(const team of S.teams) {
        const ts = teamScores.find(t=>t.id===team.id);
        for(const p of (team.players||[])) {
          if(!p.name?.trim()) continue;
          const playerId = PLAYER_IDS[p.name]; if(!playerId) continue;
          // Skip players added after this date
          if(p.addedAt && p.addedAt > dateStr) continue;
          try {
            const r = await fetch(`https://statsapi.mlb.com/api/v1/people/${playerId}/stats?stats=gameLog&group=hitting&season=${season}&startDate=2026-03-26&endDate=${dateStr}&sportId=1`);
            if(!r.ok) continue;
            const d = await r.json();
            const splits = d.stats?.[0]?.splits||[];
            let hr=0, hbp=0;
            splits.forEach(s=>{ hr+=s.stat?.homeRuns??0; hbp+=s.stat?.hitByPitch??0; });
            // Apply baseline for added players
            if(p.addedAt && p.hrBaseline!==null && p.type==="hr") hr = Math.max(0, hr - p.hrBaseline);
            if(p.addedAt && p.hbpBaseline!==null && p.type==="hbp") hbp = Math.max(0, hbp - p.hbpBaseline);
            ts.score += p.type==="hr" ? hr : hbp;
          } catch(e){continue;}
        }
      }

      const standings = [...teamScores].sort((a,b)=>b.score-a.score);
      const label = new Date(dateStr+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});
      await setDoc(doc(db,"history",dateStr), {label, date:dateStr, standings});
      done++;
    } catch(e){ continue; }
  }

  set({backfillRunning:false, backfillStatus:`Done! ${done} snapshots saved.`, backfillDone:true});
  loadHistory();
  setTimeout(()=>set({backfillStatus:"",backfillDone:false}),5000);
}


function buildHistory() {
  if(S.historyWeeks === null && !S.historyLoading) loadHistory();

  const wrap = h("div",{style:{animation:"fadeIn 0.4s ease"}});
  wrap.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"4px"}},
    h("span",{style:{fontSize:"20px"}},"📈"),
    h("h3",{style:{margin:"0",fontSize:"13px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.12em",color:C.muted}},"Season History")
  ));
  wrap.appendChild(h("div",{style:{color:C.muted,fontSize:"12px",marginBottom:"20px"}},"Daily standings · drag to replay the season"));

  if(S.historyLoading) { wrap.appendChild(spinner("Loading history…")); return wrap; }

  if(!S.historyWeeks || S.historyWeeks.length === 0) {
    wrap.appendChild(h("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:"12px",padding:"32px",textAlign:"center"}},
      h("div",{style:{fontSize:"32px",marginBottom:"8px"}},"📭"),
      h("div",{style:{color:C.text,fontWeight:"700",fontSize:"16px",marginBottom:"6px"}},"No snapshots yet"),
      h("div",{style:{color:C.muted,fontSize:"13px"}},"Use the Backfill button in the Commissioner Panel to load historical data.")
    ));
    return wrap;
  }

  const weeks = S.historyWeeks;
  const teamIds = [...new Set(weeks.flatMap(w=>w.standings.map(t=>t.id)))].sort();
  const teamNames = {};
  weeks.forEach(w=>w.standings.forEach(t=>{ teamNames[t.id]=t.name; }));

  // Colors and dash patterns per team id
  const COLORS = ["#e8c84a","#e84a4a","#4ae89a","#6ab0ff","#ff8c42","#c084fc","#f472b6","#94a3b8"];
  const DASHES = [[],[6,3],[2,2],[8,4,2,4],[4,4],[2,4],[10,3],[6,2,2,2]];
  const colorMap = {}, dashMap = {};
  teamIds.forEach((id,i)=>{ colorMap[id]=COLORS[i%COLORS.length]; dashMap[id]=DASHES[i%DASHES.length]; });

  // Build per-team score arrays aligned to dates
  const allDates = weeks.map(w=>w.date);
  const allLabels = weeks.map(w=>w.label||w.date);
  const scoresByTeam = {};
  teamIds.forEach(id=>{
    scoresByTeam[id] = weeks.map(w=>{
      const entry = w.standings.find(t=>t.id===id);
      return entry ? entry.score : null;
    });
  });

  // Slider state
  let sliderIdx = weeks.length - 1;

  // Chart container
  const chartWrap = h("div",{style:{position:"relative",width:"100%",height:"220px",marginBottom:"8px"}});
  const canvas = h("canvas",{role:"img","aria-label":"Line chart of team scores over the season"});
  chartWrap.appendChild(canvas);
  wrap.appendChild(chartWrap);

  // Slider
  const sliderRow = h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"12px"}});
  const slider = h("input");
  slider.type = "range"; slider.min = "0"; slider.max = String(weeks.length-1);
  slider.value = String(sliderIdx); slider.step = "1";
  Object.assign(slider.style, {flex:"1"});
  const sliderLabel = h("span",{style:{fontSize:"11px",color:C.muted,minWidth:"52px",textAlign:"right"}},allLabels[sliderIdx]);
  sliderRow.append(
    h("span",{style:{fontSize:"10px",color:C.muted}},allLabels[0]),
    slider,
    sliderLabel
  );
  wrap.appendChild(sliderRow);

  // Legend
  const legend = h("div",{style:{display:"flex",flexWrap:"wrap",gap:"6px 12px",marginBottom:"16px"}});
  teamIds.forEach(id=>{
    const item = h("div",{style:{display:"flex",alignItems:"center",gap:"5px"}});
    item.appendChild(h("div",{style:{width:"8px",height:"8px",borderRadius:"50%",background:colorMap[id],flexShrink:"0"}}));
    item.appendChild(h("span",{style:{fontSize:"10px",color:C.muted}},teamNames[id]||`Team ${id}`));
    legend.appendChild(item);
  });
  wrap.appendChild(legend);

  // Build Chart.js after DOM is appended
  setTimeout(()=>{
    if(!window.Chart) return;

    const WINDOW = 7;

    const buildDatasets = (upToIdx) => {
      const startIdx = Math.max(0, upToIdx - WINDOW + 1);
      return teamIds.map(id=>({
        label: teamNames[id]||`Team ${id}`,
        data: scoresByTeam[id].slice(startIdx, upToIdx+1).map((v,i)=>({x:allLabels[startIdx+i],y:v})),
        borderColor: colorMap[id],
        backgroundColor: colorMap[id]+"22",
        borderWidth: 2,
        borderDash: dashMap[id],
        pointRadius: 0,
        pointHoverRadius: 4,
        pointHoverBackgroundColor: colorMap[id],
        tension: 0.3,
        spanGaps: true,
      }));
    };

    const getYRange = (upToIdx) => {
      const startIdx = Math.max(0, upToIdx - WINDOW + 1);
      const vals = teamIds.flatMap(id=>scoresByTeam[id].slice(startIdx, upToIdx+1).filter(v=>v!==null));
      const minV = Math.max(0, Math.min(...vals) - 3);
      const maxV = Math.max(...vals) + 3;
      return {min: Math.floor(minV), max: Math.ceil(maxV)};
    };

    const chart = new window.Chart(canvas, {
      type: "line",
      data: { datasets: buildDatasets(sliderIdx) },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: {duration: 200},
        interaction: {mode:"index", intersect:false},
        plugins: {
          legend: {display:false},
          tooltip: {
            backgroundColor: C.card,
            borderColor: C.border,
            borderWidth: 1,
            titleColor: C.muted,
            bodyColor: C.text,
            callbacks: {
              title: (items) => items[0]?.label||"",
              label: (item) => ` ${item.dataset.label}: ${item.raw.y ?? "—"}`
            }
          }
        },
        scales: {
          x: {
            type: "category",
            grid: {color:"#1e2a3a"},
            ticks: {color:C.muted, font:{size:10}, maxTicksLimit:7, autoSkip:true}
          },
          y: {
            ...getYRange(sliderIdx),
            grid: {color:"#1e2a3a"},
            ticks: {color:C.muted, font:{size:10}, stepSize:5}
          }
        }
      }
    });

    slider.addEventListener("input", ()=>{
      sliderIdx = parseInt(slider.value);
      sliderLabel.textContent = allLabels[sliderIdx];
      const range = getYRange(sliderIdx);
      chart.data.datasets = buildDatasets(sliderIdx);
      chart.options.scales.y.min = range.min;
      chart.options.scales.y.max = range.max;
      chart.update();
    });
  }, 0);

  // Commission save button
  if(S.commishUnlocked) {
    wrap.appendChild(h("button",{
      style:{width:"100%",padding:"10px",background:"transparent",border:`1px solid ${C.border}`,borderRadius:"8px",color:C.muted,cursor:"pointer",fontSize:"13px"},
      onClick:async(e)=>{
        const btn=e.target; btn.textContent="Saving…"; btn.disabled=true;
        const ok=await saveHistorySnapshot(new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"}));
        if(ok){btn.textContent="✅ Saved!"; loadHistory();}
        else{btn.textContent="❌ Failed"; btn.disabled=false;}
      }
    },"💾 Save Snapshot Now"));
  }

  return wrap;
}

  const wrap = h("div",{style:{animation:"fadeIn 0.4s ease"}});

  ));

  if(!S.dbRunning) wrap.appendChild(h("button",{style:{padding:"11px 24px",borderRadius:"8px",cursor:"pointer",background:C.accent,border:"none",color:"#000",fontWeight:"700",fontSize:"14px",marginBottom:"20px"},onClick:runDebug},"🔍 Run API Check"));
  if(S.dbRunning) wrap.appendChild(h("div",{style:{marginBottom:"16px"}},spinner(`Checking ${S.dbResults.length} of 64 players…`)));
  if(S.dbResults.length>0) {
    const list = h("div",{style:{display:"flex",flexDirection:"column",gap:"6px"}});
    S.dbResults.forEach(r=>{
      const sc = r.status.startsWith("✅")?C.green:r.status.startsWith("⚠️")?C.accent:C.red;
      const card = h("div",{style:{background:C.card,border:`1px solid ${sc}33`,borderRadius:"10px",padding:"12px 16px"}});
      const top = h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"8px"}});
      const left = h("div",{style:{flex:"1"}},
        h("div",{style:{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}},
          h("span",{style:{color:C.text,fontWeight:"700",fontSize:"14px"}},r.name),
          h("span",{style:{color:sc,fontSize:"12px",fontWeight:"600"}},r.status)
        ),
        h("div",{style:{color:C.muted,fontSize:"11px",marginTop:"2px"}},`${r.fantasyTeam} · ${r.detail}`)
      );
      top.appendChild(left);
      if(r.hr!==null) {
        top.appendChild(h("div",{style:{display:"flex",gap:"10px",alignItems:"center",flexShrink:"0"}},
          r.mlbTeam?h("span",{style:{color:C.muted,fontSize:"11px",fontWeight:"700"}},r.mlbTeam):null,
          h("span",{style:{color:C.red,fontFamily:"'Bebas Neue', sans-serif",fontSize:"20px"}},`${r.hr} HR`),
          h("span",{style:{color:C.green,fontFamily:"'Bebas Neue', sans-serif",fontSize:"20px"}},`${r.hbp} HBP`)
        ));
      }
      card.appendChild(top);
      list.appendChild(card);
    });
    wrap.appendChild(list);
  }
  if(S.dbDone) {
    const ok=S.dbResults.filter(r=>r.status.startsWith("✅")).length;
    const warn=S.dbResults.filter(r=>r.status.startsWith("⚠️")).length;
    const err=S.dbResults.filter(r=>r.status.startsWith("❌")).length;
    wrap.appendChild(h("div",{style:{marginTop:"16px"}},
      h("div",{style:{color:C.muted,fontSize:"12px",marginBottom:"12px"}},`✅ ${ok} ok · ⚠️ ${warn} no stats · ❌ ${err} not found`),
      h("button",{style:{padding:"8px 18px",borderRadius:"7px",cursor:"pointer",background:"transparent",border:`1px solid ${C.border}`,color:C.muted,fontSize:"13px"},onClick:runDebug},"⟳ Run Again")
    ));
  }
  return wrap;
}

async function runDebug() {
  set({dbRunning:true,dbDone:false,dbResults:[]});
  const out=[];
  for(const team of S.teams) {
    for(const p of (team.players||[])) {
      if(!p.name?.trim()) continue;
      try {
        let playerId = PLAYER_IDS[p.name] || null;
        let matchedName = p.name;
        if (!playerId) {
          const r = await fetch(`https://statsapi.mlb.com/api/v1/people/search?names=${encodeURIComponent(p.name)}&sportId=1`);
          const d = await r.json();
          const person = d.people?.[0];
          if(!person){ out.push({name:p.name,fantasyTeam:team.name,status:"❌ Not found",detail:"No player matched this name",hr:null,hbp:null,mlbTeam:null}); set({dbResults:[...out]}); continue; }
          playerId = person.id;
          matchedName = person.fullName;
        }
        const season=new Date().getFullYear();
        const r2=await fetch(`https://statsapi.mlb.com/api/v1/people/${playerId}/stats?stats=season&group=hitting&season=${season}&sportId=1`);
        const d2=await r2.json();
        const split=d2.stats?.[0]?.splits?.[0];
        if(!split) out.push({name:p.name,fantasyTeam:team.name,status:"⚠️ No stats yet",detail:`Found as "${matchedName}" but no ${season} stats`,hr:null,hbp:null,mlbTeam:null});
        else out.push({name:p.name,fantasyTeam:team.name,status:"✅ OK",detail:`Matched as "${matchedName}"`,hr:split.stat?.homeRuns??0,hbp:split.stat?.hitByPitch??0,mlbTeam:split.team?.abbreviation??null});
      } catch(e){ out.push({name:p.name,fantasyTeam:team.name,status:"💥 Error",detail:String(e),hr:null,hbp:null,mlbTeam:null}); }
      set({dbResults:[...out]});
    }
  }
  set({dbRunning:false,dbDone:true});
}

// ── Rosters ───────────────────────────────────────────────────────────────────
async function openSpotlight(playerName, fantasyTeam, type) {
  set({spotlightPlayer:{name:playerName, fantasyTeam, type}, spotlightData:null, spotlightLoading:true});
  const playerId = PLAYER_IDS[playerName];
  if(!playerId) { set({spotlightLoading:false}); return; }
  const season = new Date().getFullYear();
  try {
    const [sr, lr] = await Promise.all([
      fetch(`https://statsapi.mlb.com/api/v1/people/${playerId}/stats?stats=season&group=hitting&season=${season}&sportId=1`),
      fetch(`https://statsapi.mlb.com/api/v1/people/${playerId}/stats?stats=lastXGames&group=hitting&season=${season}&sportId=1&limit=7`)
    ]);
    const [sd, ld] = await Promise.all([sr.json(), lr.json()]);
    const season_split = sd.stats?.[0]?.splits?.[0]?.stat || {};
    const last7_split = ld.stats?.[0]?.splits?.[0]?.stat || {};
    set({spotlightLoading:false, spotlightData:{season:season_split, last7:last7_split, playerId}});
  } catch(e) {
    set({spotlightLoading:false, spotlightData:null});
  }
}

// ── Projected Team Breakdown Modal ────────────────────────────────────────────
function buildProjectedTeamModal() {
  const {team, gamesPlayed, gamesRemaining, paceWeight, projWeight} = S.projectedTeam;
  const TOTAL_GAMES = 162;
  const overlay = h("div",{style:{position:"fixed",inset:"0",background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:"1100",padding:"16px"},onClick:()=>set({projectedTeam:null})});
  const modal = h("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:"16px",padding:"0",maxWidth:"420px",width:"100%",maxHeight:"88vh",overflowY:"auto"},onClick:e=>e.stopPropagation()});
  const hdr = h("div",{style:{padding:"18px 18px 12px",borderBottom:`1px solid ${C.border}`}});
  hdr.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"4px"}},
    h("div",{},
      h("div",{style:{color:C.text,fontWeight:"800",fontSize:"18px"}},team.name),
      h("div",{style:{color:C.muted,fontSize:"12px",marginTop:"2px"}},team.owner||"")
    ),
    h("button",{style:{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:"20px",lineHeight:"1"},onClick:()=>set({projectedTeam:null})},"✕")
  ));
  hdr.appendChild(h("div",{style:{color:C.muted,fontSize:"11px"}},
    `${Math.round(projWeight*100)}% preseason · ${Math.round(paceWeight*100)}% pace · ${gamesRemaining} games left`
  ));
  modal.appendChild(hdr);
  const playerProj = (p) => {
    const actual = p.type==="hr" ? (p.effectiveHR||0) : (p.effectiveHBP||0);
    const preseason = PRESEASON_PROJ[p.name] ?? null;
    let projFinal;
    if(preseason === null) {
      const rate = actual / Math.max(gamesPlayed, 1);
      projFinal = actual + rate * gamesRemaining;
    } else {
      const paceRate = actual / Math.max(gamesPlayed, 1);
      const paceRemaining = paceRate * gamesRemaining;
      const preseasonRemaining = (preseason / TOTAL_GAMES) * gamesRemaining;
      projFinal = actual + (paceWeight * paceRemaining) + (projWeight * preseasonRemaining);
    }
    const projRounded = Math.round(projFinal);
    const diff = preseason !== null ? projRounded - preseason : null;
    let heat = "—";
    if(preseason && preseason > 0) {
      const seasonPace = Math.round((actual / Math.max(gamesPlayed,1)) * TOTAL_GAMES);
      const pct = (seasonPace - preseason) / preseason;
      if(pct >= 0.20) heat = "🔥🔥🔥";
      else if(pct >= 0) heat = "🔥🔥";
      else if(pct >= -0.20) heat = "🔥";
      else heat = "❄️";
    }
    return { actual, preseason, projFinal: projRounded, diff, heat };
  };
  const colHdr = () => h("div",{style:{display:"flex",alignItems:"center",gap:"4px",padding:"4px 16px",background:C.surface}},
    h("div",{style:{minWidth:"22px"}},""),
    h("div",{style:{flex:"1"}},""),
    h("div",{style:{minWidth:"26px",textAlign:"right",color:C.muted,fontSize:"9px",textTransform:"uppercase",letterSpacing:"0.07em",fontWeight:"700"}},"now"),
    h("div",{style:{minWidth:"34px",textAlign:"right",color:C.muted,fontSize:"9px",textTransform:"uppercase",letterSpacing:"0.07em",fontWeight:"700"}},"proj"),
    h("div",{style:{minWidth:"30px",textAlign:"right",color:C.muted,fontSize:"9px",textTransform:"uppercase",letterSpacing:"0.07em",fontWeight:"700"}},"vs pre")
  );
  const buildSection = (players, typeColor, typeLabel) => {
    if(!players.length) return;
    modal.appendChild(h("div",{style:{color:typeColor,fontSize:"10px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.1em",padding:"10px 16px 0"}},typeLabel));
    modal.appendChild(colHdr());
    const list = h("div",{style:{marginBottom:"6px"}});
    players.forEach((p,i) => {
      const {actual, preseason, projFinal, diff, heat} = playerProj(p);
      const isLast = i === players.length - 1;
      const row = h("div",{class:"row-hover",style:{display:"flex",alignItems:"center",gap:"4px",padding:"8px 16px",borderBottom:isLast?"none":`1px solid ${C.border}22`,cursor:"pointer"},onClick:()=>openSpotlight(p.name,team.name,p.type)});
      row.appendChild(h("div",{style:{minWidth:"22px",fontSize:"13px",lineHeight:"1"}},heat));
      const nameCol = h("div",{style:{flex:"1",minWidth:0}});
      const nameEl = h("span",{style:{color:p.droppedAt?C.muted:C.text,fontWeight:"600",fontSize:"13px"}},p.name);
      if(p.teamAbbr) nameEl.appendChild(h("span",{style:{color:C.muted,fontWeight:"400",fontSize:"11px"}},` (${p.teamAbbr})`));
      nameCol.appendChild(nameEl);
      if(preseason !== null) nameCol.appendChild(h("div",{style:{color:C.muted,fontSize:"9px",marginTop:"1px"}},`pre: ${preseason}`));
      row.appendChild(nameCol);
      const nowEl = h("div",{style:{minWidth:"26px",textAlign:"right"}});
      nowEl.appendChild(h("div",{style:{color:typeColor,fontFamily:"'Bebas Neue', sans-serif",fontSize:"17px",fontWeight:"800",lineHeight:"1"}},actual));
      row.appendChild(nowEl);
      const projEl = h("div",{style:{minWidth:"34px",textAlign:"right"}});
      projEl.appendChild(h("div",{style:{color:typeColor,fontFamily:"'Bebas Neue', sans-serif",fontSize:"22px",fontWeight:"800",lineHeight:"1"}},projFinal));
      projEl.appendChild(h("div",{style:{color:C.muted,fontSize:"8px",textTransform:"uppercase"}},"proj"));
      row.appendChild(projEl);
      const diffEl = h("div",{style:{minWidth:"30px",textAlign:"right"}});
      if(diff !== null) {
        const diffColor = diff > 0 ? "#4caf50" : diff < 0 ? "#6ab0ff" : C.muted;
        diffEl.appendChild(h("div",{style:{color:diffColor,fontSize:"11px",fontWeight:"800",lineHeight:"1"}},diff > 0 ? `+${diff}` : `${diff}`));
        diffEl.appendChild(h("div",{style:{color:C.muted,fontSize:"8px",textTransform:"uppercase"}},"vs pre"));
      } else {
        diffEl.appendChild(h("div",{style:{color:C.muted,fontSize:"11px"}},"—"));
      }
      row.appendChild(diffEl);
      list.appendChild(row);
    });
    modal.appendChild(list);
  };
  buildSection((team.players||[]).filter(p=>p.type==="hr"&&!p.droppedAt), C.red, "HR Players");
  buildSection((team.players||[]).filter(p=>p.type==="hbp"&&!p.droppedAt), C.green, "HBP Player");
  const allActive = (team.players||[]).filter(p=>!p.droppedAt);
  const totalProj = allActive.reduce((s,p)=>s+playerProj(p).projFinal, 0);
  modal.appendChild(h("div",{style:{background:`${C.accent}11`,border:`1px solid ${C.accent}33`,margin:"8px 16px 16px",borderRadius:"10px",padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}},
    h("div",{},
      h("div",{style:{color:C.muted,fontSize:"11px",fontWeight:"600"}},"Projected Team Total"),
      h("div",{style:{color:C.muted,fontSize:"9px",marginTop:"3px"}},"🔥🔥🔥 20%+ above pre  🔥🔥 on pace  🔥 slightly below  ❄️ cold")
    ),

// ── Commissioner Panel ────────────────────────────────────────────────────────

  const of=h("div"); of.appendChild(h("label",{style:{color:C.muted,fontSize:"11px",textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:"4px"}},"Owner")); of.appendChild(inp(team.owner,v=>{local[S.cpActive].owner=v;set({cpLocal:local})},"Owner"));

    rr.appendChild(h("button",{style:{padding:"7px 14px",borderRadius:"6px",cursor:"pointer",background:C.green+"22",border:`1px solid ${C.green}44`,color:C.green,fontSize:"12px",fontWeight:"700",whiteSpace:"nowrap"},onClick:()=>{const name=S.cpReplHR.trim();if(!name)return;const today=new Date().toISOString().split("T")[0];local[S.cpActive].players.push({name,type:"hr",droppedAt:null,addedAt:today,rawHR:0,effectiveHR:0,hrBaseline:null,teamAbbr:null});set({cpLocal:local,cpReplHR:""});}},"Add"));

// ── Main render ───────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  app.innerHTML="";

  // Header
  const header=h("div",{style:{background:`linear-gradient(135deg,${C.surface} 0%,#0d1729 100%)`,borderBottom:`1px solid ${C.border}`,paddingTop:"max(env(safe-area-inset-top), 20px)",paddingBottom:"16px",paddingLeft:"20px",paddingRight:"20px"}});
  const hInner=h("div",{style:{maxWidth:"640px",margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:"12px"}});
  const titleBlock=h("div",{},
    h("div",{style:{fontFamily:"'Bebas Neue', sans-serif",fontSize:"38px",letterSpacing:"0.05em",color:C.accent,lineHeight:"1"}},"⚾ DINGERS ONLY"),
    h("div",{style:{color:C.muted,fontSize:"13px",letterSpacing:"0.15em",textTransform:"uppercase",marginTop:"2px"}},"Fantasy Baseball · 2026"),
    h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginTop:"10px"}},
      h("button",{style:{padding:"6px 14px",borderRadius:"6px",cursor:"pointer",fontWeight:"700",fontSize:"12px",background:`${C.accent}22`,border:`1px solid ${C.accent}55`,color:C.accent,opacity:S.refreshing?"0.6":"1"},onClick:refreshAllStats},S.refreshing?"⟳ Refreshing…":"⟳ Refresh Stats"),
      S.refreshStatus?h("span",{style:{color:C.green,fontSize:"12px"}},S.refreshStatus):S.lastUpdated?h("span",{style:{color:C.muted,fontSize:"11px"}},`Updated ${fmtTime(S.lastUpdated)}`):null
    )
  );
  const authBlock=h("div",{style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"6px"}});
  if(!S.commishUnlocked){
    const pwRow=h("div",{style:{display:"flex",gap:"6px",alignItems:"center"}});
    const pwInp=h("input",{type:"password",placeholder:"Commissioner PIN",style:{background:C.bg,border:`1px solid ${S.pwError?C.red:C.border}`,borderRadius:"6px",padding:"7px 10px",color:C.text,fontSize:"13px",outline:"none",width:"155px"}});
    pwInp.value=S.commishInput;
    pwInp.addEventListener("input",e=>set({commishInput:e.target.value,pwError:false}));
    pwInp.addEventListener("keydown",e=>{if(e.key==="Enter")handleLogin();});
    pwRow.append(pwInp,h("button",{style:{padding:"7px 12px",borderRadius:"6px",cursor:"pointer",background:C.accent,border:"none",color:"#000",fontWeight:"700",fontSize:"13px"},onClick:handleLogin},"Enter"));
    authBlock.appendChild(pwRow);
    if(S.pwError) authBlock.appendChild(h("span",{style:{color:C.red,fontSize:"12px"}},"Incorrect password"));
  } else {
    authBlock.appendChild(h("button",{style:{padding:"7px 14px",borderRadius:"6px",cursor:"pointer",background:C.accent,border:"none",color:"#000",fontWeight:"700",fontSize:"13px"},onClick:()=>{set({showCommish:true,cpLocal:JSON.parse(JSON.stringify(S.teams)),cpActive:0});}},"⚙️ Manage League"));
  }
  hInner.append(titleBlock,authBlock);
  header.appendChild(hInner);
  app.appendChild(header);

  // Tabs
  const tabs=[{id:"standings",label:"🏆 Standings"},{id:"leaderboard",label:"📊 Leaderboard"},{id:"projected",label:"🔮 Projected"},{id:"scores",label:"⚾ Scores"},{id:"recent",label:"📅 Recent"},{id:"history",label:"📈 History"},{id:"rules",label:"📖 Rules"},...(S.commishUnlocked?[{id:"debug",label:"🔍 Debug"}]:[])];
  const tabBar=h("div",{style:{borderBottom:`1px solid ${C.border}`,background:C.surface}});
  const tabInner=h("div",{style:{maxWidth:"640px",margin:"0 auto",display:"flex",padding:"0 16px",overflowX:"auto"}});
  tabs.forEach(tab=>{
    const active=S.tab===tab.id;
    tabInner.appendChild(h("button",{class:"tab-btn",style:{padding:"13px 16px",background:"none",border:"none",borderBottom:active?`2px solid ${C.accent}`:"2px solid transparent",color:active?C.accent:C.muted,fontWeight:active?"700":"500",fontSize:"13px",cursor:"pointer",whiteSpace:"nowrap"},onClick:()=>set({tab:tab.id})},tab.label));
  });
  tabBar.appendChild(tabInner);
  app.appendChild(tabBar);

  // Body
  const body=h("div",{style:{maxWidth:"640px",margin:"0 auto",padding:"24px 16px"}});
  if(S.tab==="standings") body.appendChild(buildStandings());
  else if(S.tab==="leaderboard") body.appendChild(buildLeaderboard());
  else if(S.tab==="projected") body.appendChild(buildProjected());

  else if(S.tab==="scores") body.appendChild(buildScores());
  else if(S.tab==="recent") body.appendChild(buildRecent());
  else if(S.tab==="history") body.appendChild(buildHistory());
  else if(S.tab==="rules") body.appendChild(buildRules());
  else if(S.tab==="debug") body.appendChild(buildDebug());
  app.appendChild(body);

  if(S.selectedTeam) app.appendChild(buildTeamModal(S.selectedTeam));
  if(S.spotlightPlayer) app.appendChild(buildSpotlightModal());
  if(S.projectedTeam) app.appendChild(buildProjectedTeamModal());
  if(S.showCommish&&S.cpLocal) app.appendChild(buildCommish());
}

function handleLogin() {
  if(S.commishInput===PASS){ set({commishUnlocked:true,showCommish:true,pwError:false,cpLocal:JSON.parse(JSON.stringify(S.teams)),cpActive:0}); }
  else set({pwError:true});
}

render();
setInterval(() => { if(S.tab === "rules") render(); }, 60000);

const _splash = document.getElementById("splash-screen");
if(_splash) {
  setTimeout(() => {
    _splash.classList.add("fade-out");
    setTimeout(() => { if(_splash.parentNode) _splash.parentNode.removeChild(_splash); }, 600);
  }, 1900);
}

</script>
