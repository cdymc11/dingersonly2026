// Save a weekly snapshot — called automatically on Mondays & manually by commish
async function saveHistorySnapshot(label) {
  try {
    const now = new Date();
    const weekLabel = label || `Week of ${now.toLocaleDateString("en-US",{month:"short",day:"numeric"})}`;
    const docId = now.toISOString().split("T")[0]; // YYYY-MM-DD as doc ID
    const snapshot = S.teams.map(t => ({
      id: t.id,
      name: t.name,
      owner: t.owner || "",
      score: score(t),
    })).sort((a,b) => b.score - a.score);
    await setDoc(doc(db,"history",docId), { label: weekLabel, date: docId, standings: snapshot });
    return true;
  } catch(e) {
    console.error("History save failed:", e);
    return false;
  }
}

// Load all history snapshots from Firebase
async function loadHistory() {
  set({historyLoading: true});
  try {
    const q = query(historyCol, orderBy("date","asc"));
    const snap = await getDocs(q);
    const weeks = snap.docs.map(d => d.data());
    set({historyWeeks: weeks, historyLoading: false, historyWeekIdx: weeks.length - 1});
  } catch(e) {
    set({historyWeeks: [], historyLoading: false});
  }
}

// Auto-snapshot every Monday — checks once on load
function maybeAutoSnapshot() {
  const now = new Date();
  if(now.getDay() !== 1) return; // only on Monday
  const todayStr = now.toISOString().split("T")[0];
  const lastSnap = localStorage.getItem("lastHistorySnap");
  if(lastSnap === todayStr) return; // already snapped today
  // Wait until stats are loaded (give it 5s after firebase sync)
  setTimeout(async () => {
    if(S.teams && S.teams.some(t => score(t) > 0)) {
      const ok = await saveHistorySnapshot();
      if(ok) localStorage.setItem("lastHistorySnap", todayStr);
    }
  }, 5000);
}

async function fetchStats(name) {
  try {
    let playerId = PLAYER_IDS[name] || null;
    if (!playerId) {
      const r = await fetch(`https://statsapi.mlb.com/api/v1/people/search?names=${encodeURIComponent(name)}&sportId=1`);
      if (!r.ok) return null;
      const d = await r.json();
      const person = d.people?.[0]; if(!person) return null;
      playerId = person.id;
    }
    const season = new Date().getFullYear();
    const r2 = await fetch(`https://statsapi.mlb.com/api/v1/people/${playerId}/stats?stats=season&group=hitting&season=${season}&sportId=1`);
    if (!r2.ok) return { hr: 0, hbp: 0, playerId, teamAbbr: null };
    const d2 = await r2.json();
    const split = d2.stats?.[0]?.splits?.[0];
    // No splits = player found but no stats yet (0 games played) — return zeros
    return { hr: split?.stat?.homeRuns??0, hbp: split?.stat?.hitByPitch??0, playerId, teamAbbr: split?.team?.abbreviation??null };
  } catch { return null; }
}

async function fetchYesterday(playerId) {
  try {
    const y = new Date(); y.setDate(y.getDate()-1);
    const ds = y.toISOString().split("T")[0];
    const season = new Date().getFullYear();
    const r = await fetch(`https://statsapi.mlb.com/api/v1/people/${playerId}/stats?stats=gameLog&group=hitting&season=${season}&startDate=${ds}&endDate=${ds}&sportId=1`);
    const d = await r.json();
    const stat = d.stats?.[0]?.splits?.[0]?.stat; if(!stat) return null;
    return { hr: stat.homeRuns??0, hbp: stat.hitByPitch??0 };
  } catch { return null; }
}

// Correct known misspellings from old Firebase data
const NAME_CORRECTIONS = {
  "Joe Adell": "Jo Adell",
  "Caleb Durin": "Caleb Durbin",
};

// Listen to Firebase for real-time updates
// We always use HARDCODED_TEAMS for names/structure, but merge saved stats on top
onSnapshot(leagueRef, snap => {
  if(snap.exists()) {
    const data = snap.data();
    if(data.teams?.length > 0) {
      // Build a lookup of saved player stats keyed by player ID or position
      const merged = JSON.parse(JSON.stringify(HARDCODED_TEAMS));
      merged.forEach(team => {
        const saved = data.teams.find(t => t.id === team.id);
        if(!saved) return;
        // Copy transaction/stat fields from saved team
        team.hasUsedTransaction = saved.hasUsedTransaction || false;
        // Match players by index (same draft order), copy stats over
        team.players.forEach((p, i) => {
          const sp = saved.players?.[i];
          if(!sp) return;
          if(p.type === "hr") {
            p.effectiveHR = sp.effectiveHR || 0;
            p.hrBaseline = sp.hrBaseline ?? null;
            p.droppedAt = sp.droppedAt || null;
            p.addedAt = sp.addedAt || null;
            if(sp.teamAbbr) p.teamAbbr = sp.teamAbbr;
          }
          if(p.type === "hbp") {
            p.effectiveHBP = sp.effectiveHBP || 0;
            p.hbpBaseline = sp.hbpBaseline ?? null;
            p.droppedAt = sp.droppedAt || null;
            p.addedAt = sp.addedAt || null;
            if(sp.teamAbbr) p.teamAbbr = sp.teamAbbr;
          }
        });
        // Also append any added (transaction) players beyond the base 8
        if(saved.players?.length > team.players.length) {
          const extra = saved.players.slice(team.players.length);
          extra.forEach(ep => {
            ep.name = NAME_CORRECTIONS[ep.name] || ep.name;
            team.players.push(ep);
          });
        }
      });
      set({ teams: merged, lastUpdated: data.lastUpdated||null });
      maybeAutoSnapshot();
    }
  }
});

async function saveToFirebase(teams) {
  const now = new Date().toISOString();
  // Always enforce hardcoded team names before saving
  const corrected = teams.map(t => {
    const hc = HARDCODED_TEAMS.find(h => h.id === t.id);
    return hc ? { ...t, name: hc.name, owner: hc.owner } : t;
  });
  await setDoc(leagueRef, { teams: corrected, lastUpdated: now });
  set({ teams: corrected, lastUpdated: now });
}

// ── MLB Stats refresh ─────────────────────────────────────────────────────────
async function refreshAllStats() {
  set({ refreshing: true, refreshStatus: "Fetching stats…" });
  const updated = JSON.parse(JSON.stringify(S.teams));
  for(const t of updated) {
    for(const p of t.players) {
      if(!p.name?.trim()) continue;
      const s = await fetchStats(p.name); if(!s) continue;
      if(p.type==="hr" && !p.droppedAt) {
        if(p.addedAt){ if(p.hrBaseline===null) p.hrBaseline=s.hr; p.effectiveHR=Math.max(0,s.hr-p.hrBaseline); }
        else p.effectiveHR=s.hr;
      }
      if(p.type==="hbp" && !p.droppedAt) {
        if(p.addedAt){ if(p.hbpBaseline===null) p.hbpBaseline=s.hbp; p.effectiveHBP=Math.max(0,s.hbp-p.hbpBaseline); }
        else p.effectiveHBP=s.hbp;
      }
      if(s.teamAbbr) p.teamAbbr=s.teamAbbr;
    }
  }
  await saveToFirebase(updated);
  set({ refreshing: false, refreshStatus: "✓ Updated!" });
  setTimeout(()=>set({refreshStatus:""}), 3000);
}

// ── Render ────────────────────────────────────────────────────────────────────
function h(tag, attrs={}, ...children) {
  const e = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)) {
    if(k==="style"&&typeof v==="object") Object.assign(e.style,v);
    else if(k.startsWith("on")&&typeof v==="function") e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="class") e.className=v;
    else if(k==="disabled"){ if(v) e.disabled=true; }
    else e.setAttribute(k,v);
  }
  for(const c of children) {
    if(c==null||c===false) continue;
    if(c instanceof Node) e.appendChild(c);
    else e.appendChild(document.createTextNode(String(c)));
  }
  return e;
}

function badge(label, color) {
  return h("span",{style:{background:color+"22",color,border:`1px solid ${color}44`,borderRadius:"4px",padding:"2px 7px",fontSize:"11px",fontWeight:"700",letterSpacing:"0.05em",textTransform:"uppercase"}},label);
}

function spinner(msg="Loading…") {

  const spin = h("div",{style:{width:"14px",height:"14px",border:`2px solid ${C.border}`,borderTopColor:C.accent,borderRadius:"50%",animation:"spin 0.8s linear infinite"}});

}

// ── Rank info builder (tie-aware) ─────────────────────────────────────────────
function buildRankInfo(scores) {
  const n = scores.length;
  const result = scores.map(() => ({ icon: "", isSpecial: false }));
  if(n === 0) return result;
  const distinct = [...new Set(scores)].sort((a,b)=>b-a);
  const highest = distinct[0];
  const lowest = distinct[distinct.length - 1];
  const secondDistinct = distinct.length > 1 ? distinct[1] : null;
  scores.forEach((s, i) => {
    if(s === highest) {
      result[i] = { icon: "🥇", isSpecial: true };
    } else if(s === lowest || (secondDistinct !== null && s === secondDistinct)) {
      result[i] = { icon: "💀", isSpecial: true };
    } else {
      const rank = distinct.indexOf(s) + 1;
      result[i] = { icon: `#${rank}`, isSpecial: false };
    }
  });
  return result;
}

async function loadYesterday() {
  set({ydLoading:true,ydDone:false,ydResults:null});
  const hits=[];
  for(const team of S.teams) {
    for(const p of (team.players||[])) {
      if(!p.name?.trim()) continue;
      const s = await fetchStats(p.name); if(!s?.playerId) continue;
      const y = await fetchYesterday(s.playerId); if(!y) continue;
      if(p.type==="hr"&&y.hr>0) hits.push({name:p.name,teamAbbr:s.teamAbbr,fantasyTeam:team.name,stat:y.hr,type:"hr"});
      if(p.type==="hbp"&&y.hbp>0) hits.push({name:p.name,teamAbbr:s.teamAbbr,fantasyTeam:team.name,stat:y.hbp,type:"hbp"});
    }
  }
  hits.sort((a,b)=>b.stat-a.stat);
  set({ydLoading:false,ydDone:true,ydResults:hits});
}

async function loadWeeklyRecap(startDate, endDate) {
  set({wkLoading:true,wkDone:false,wkResults:null});
  const season = new Date().getFullYear();
  const teamWeeks = S.teams.map(t=>({id:t.id, name:t.name, hr:0, hbp:0, pts:0}));
  const allPlayers = [];
  try {
    for(const ft of S.teams) {
      const tw = teamWeeks.find(t=>t.id===ft.id);
      for(const p of (ft.players||[])) {
        if(!p.name?.trim()) continue;
        const playerId = PLAYER_IDS[p.name]; if(!playerId) continue;
        try {
          const r = await fetch(`https://statsapi.mlb.com/api/v1/people/${playerId}/stats?stats=gameLog&group=hitting&season=${season}&startDate=${startDate}&endDate=${endDate}&sportId=1`);
          if(!r.ok) continue;
          const d = await r.json();
          const splits = d.stats?.[0]?.splits||[];
          let hr=0,hbp=0;
          splits.forEach(s=>{ hr+=s.stat?.homeRuns??0; hbp+=s.stat?.hitByPitch??0; });
          const pts = p.type==="hr"?hr:hbp;
          if(p.type==="hr") tw.hr+=hr;
          if(p.type==="hbp") tw.hbp+=hbp;
          tw.pts+=pts;
          allPlayers.push({name:p.name,fantasyTeam:ft.name,type:p.type,pts,hr,hbp});
        } catch(e){continue;}
      }
    }
    const hrPlayers = allPlayers.filter(p=>p.type==="hr").sort((a,b)=>b.pts-a.pts);
    const hbpPlayers = allPlayers.filter(p=>p.type==="hbp").sort((a,b)=>b.pts-a.pts);
    const topTeam = [...teamWeeks].sort((a,b)=>b.pts-a.pts)[0];
    set({wkLoading:false,wkDone:true,wkResults:{
      teamWeeks,
      allPlayers,
      topHR: hrPlayers[0]?{name:hrPlayers[0].name,val:hrPlayers[0].pts}:null,
      topHBP: hbpPlayers[0]?{name:hbpPlayers[0].name,val:hbpPlayers[0].pts}:null,
      teamOfWeek: topTeam?{name:topTeam.name,pts:topTeam.pts}:null,
    }});
  } catch(e) {
    set({wkLoading:false,wkDone:true,wkResults:null});
  }
}

      S.commishUnlocked ? h("button",{style:{padding:"10px 24px",borderRadius:"8px",cursor:"pointer",background:C.accent,border:"none",color:"#000",fontWeight:"700",fontSize:"13px"},onClick:async(e)=>{
        const btn = e.target;
        btn.textContent = "Saving…";
        btn.disabled = true;
        const ok = await saveHistorySnapshot(`Week of ${new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"})}`);
        if(ok) { btn.textContent = "✅ Saved!"; loadHistory(); }
        else { btn.textContent = "❌ Failed — check Firebase rules"; btn.disabled = false; }
      }},"💾 Save Snapshot Now") : h("div",{style:{color:C.muted,fontSize:"12px"}},"Enter commissioner PIN to save a snapshot manually")
    ));
    return wrap;
  }

  const weeks = S.historyWeeks;
  const idx = Math.max(0, Math.min(S.historyWeekIdx, weeks.length - 1));
  const current = weeks[idx];
  const prev = idx > 0 ? weeks[idx - 1] : null;

  // Week selector
  const selector = h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",background:C.card,border:`1px solid ${C.border}`,borderRadius:"10px",padding:"10px 16px",marginBottom:"20px"}});
  selector.appendChild(h("button",{style:{background:"none",border:"none",color:idx>0?C.accent:C.border,fontSize:"22px",cursor:idx>0?"pointer":"default",padding:"0 4px"},onClick:()=>idx>0&&set({historyWeekIdx:idx-1})},"‹"));
  const midEl = h("div",{style:{textAlign:"center"}});
  midEl.appendChild(h("div",{style:{color:C.text,fontWeight:"700",fontSize:"14px"}},current.label));
  midEl.appendChild(h("div",{style:{color:C.muted,fontSize:"11px"}},`${idx+1} of ${weeks.length}`));
  selector.appendChild(midEl);
  selector.appendChild(h("button",{style:{background:"none",border:"none",color:idx<weeks.length-1?C.accent:C.border,fontSize:"22px",cursor:idx<weeks.length-1?"pointer":"default",padding:"0 4px"},onClick:()=>idx<weeks.length-1&&set({historyWeekIdx:idx+1})},"›"));
  wrap.appendChild(selector);

  // Standings for this week
  const list = h("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:"12px",overflow:"hidden",marginBottom:"20px"}});
  current.standings.forEach((team, i) => {
    const prevRank = prev ? prev.standings.findIndex(t=>t.id===team.id) : -1;
    const movement = prev && prevRank !== -1 ? prevRank - i : null; // positive = moved up
    let movEl;
    if(movement === null) movEl = h("span",{style:{color:C.muted,fontSize:"12px"}},"—");
    else if(movement > 0) movEl = h("span",{style:{color:"#4caf50",fontSize:"12px",fontWeight:"700"}},`↑${movement}`);
    else if(movement < 0) movEl = h("span",{style:{color:"#6ab0ff",fontSize:"12px",fontWeight:"700"}},`↓${Math.abs(movement)}`);
    else movEl = h("span",{style:{color:C.muted,fontSize:"12px"}},"—");

    const isFirst = i === 0;
    const isLast = i === current.standings.length - 1;
    const row = h("div",{style:{
      display:"flex",alignItems:"center",gap:"12px",padding:"12px 16px",
      borderBottom:i<current.standings.length-1?`1px solid ${C.border}22`:"none",
      background:isFirst?`${C.accent}08`:isLast?`#6ab0ff08`:"transparent"
    }});

    // Rank
    let rankEl;
    if(isFirst) rankEl = h("span",{style:{fontSize:"18px",minWidth:"28px",textAlign:"center"}},"🥇");
    else if(isLast) rankEl = h("span",{style:{fontSize:"18px",minWidth:"28px",textAlign:"center"}},"💀");
    else rankEl = h("span",{style:{color:C.muted,fontWeight:"700",fontSize:"13px",minWidth:"28px",textAlign:"center"}},`#${i+1}`);
    row.appendChild(rankEl);

    // Team info
    const info = h("div",{style:{flex:"1"}});
    info.appendChild(h("div",{style:{color:C.text,fontWeight:"700",fontSize:"14px"}},team.name));
    info.appendChild(h("div",{style:{color:C.muted,fontSize:"11px"}},team.owner));
    row.appendChild(info);

    // Movement
    row.appendChild(movEl);

    // Score
    const scoreEl = h("div",{style:{textAlign:"right",minWidth:"48px"}});
    scoreEl.appendChild(h("div",{style:{color:C.accent,fontFamily:"'Bebas Neue', sans-serif",fontSize:"26px",fontWeight:"800",lineHeight:"1"}},team.score));
    scoreEl.appendChild(h("div",{style:{color:C.muted,fontSize:"10px",textTransform:"uppercase"}},"pts"));
    row.appendChild(scoreEl);
    list.appendChild(row);
  });
  wrap.appendChild(list);

  // Commish save button
  if(S.commishUnlocked) {
    wrap.appendChild(h("button",{
      style:{width:"100%",padding:"10px",background:"transparent",border:`1px solid ${C.border}`,borderRadius:"8px",color:C.muted,cursor:"pointer",fontSize:"13px"},
      onClick:async(e)=>{
        const btn = e.target;
        btn.textContent = "Saving…";
        btn.disabled = true;
        const ok = await saveHistorySnapshot(`Week of ${new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"})}`);
        if(ok) { btn.textContent = "✅ Saved!"; loadHistory(); }
        else { btn.textContent = "❌ Failed — check Firebase rules"; btn.style.color = C.red; btn.disabled = false; }
      }
    },"💾 Save Snapshot Now"));
  }

  return wrap;
}

// ── Debug ─────────────────────────────────────────────────────────────────────
function buildDebug() {
  const wrap = h("div",{style:{animation:"fadeIn 0.4s ease"}});
  wrap.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"6px"}},
    h("span",{style:{fontSize:"20px"}},"🔍"),
    h("h3",{style:{margin:"0",fontSize:"13px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.12em",color:C.muted}},"API Debug")
  ));
  wrap.appendChild(h("p",{style:{color:C.muted,fontSize:"13px",marginBottom:"16px"}},"Tests every player against the MLB API — useful for spotting name mismatches or missing stats."));
  if(!S.dbRunning) wrap.appendChild(h("button",{style:{padding:"11px 24px",borderRadius:"8px",cursor:"pointer",background:C.accent,border:"none",color:"#000",fontWeight:"700",fontSize:"14px",marginBottom:"20px"},onClick:runDebug},"🔍 Run API Check"));
  if(S.dbRunning) wrap.appendChild(h("div",{style:{marginBottom:"16px"}},spinner(`Checking ${S.dbResults.length} of 64 players…`)));
  if(S.dbResults.length>0) {
    const list = h("div",{style:{display:"flex",flexDirection:"column",gap:"6px"}});
    S.dbResults.forEach(r=>{
      const sc = r.status.startsWith("✅")?C.green:r.status.startsWith("⚠️")?C.accent:C.red;
      const card = h("div",{style:{background:C.card,border:`1px solid ${sc}33`,borderRadius:"10px",padding:"12px 16px"}});
      const top = h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"8px"}});
      const left = h("div",{style:{flex:"1"}},
        h("div",{style:{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}},
          h("span",{style:{color:C.text,fontWeight:"700",fontSize:"14px"}},r.name),
          h("span",{style:{color:sc,fontSize:"12px",fontWeight:"600"}},r.status)
        ),
        h("div",{style:{color:C.muted,fontSize:"11px",marginTop:"2px"}},`${r.fantasyTeam} · ${r.detail}`)
      );
      top.appendChild(left);
      if(r.hr!==null) {
        top.appendChild(h("div",{style:{display:"flex",gap:"10px",alignItems:"center",flexShrink:"0"}},
          r.mlbTeam?h("span",{style:{color:C.muted,fontSize:"11px",fontWeight:"700"}},r.mlbTeam):null,
          h("span",{style:{color:C.red,fontFamily:"'Bebas Neue', sans-serif",fontSize:"20px"}},`${r.hr} HR`),
          h("span",{style:{color:C.green,fontFamily:"'Bebas Neue', sans-serif",fontSize:"20px"}},`${r.hbp} HBP`)
        ));
      }
      card.appendChild(top);
      list.appendChild(card);
    });
    wrap.appendChild(list);
  }
  if(S.dbDone) {
    const ok=S.dbResults.filter(r=>r.status.startsWith("✅")).length;
    const warn=S.dbResults.filter(r=>r.status.startsWith("⚠️")).length;
    const err=S.dbResults.filter(r=>r.status.startsWith("❌")).length;
    wrap.appendChild(h("div",{style:{marginTop:"16px"}},
      h("div",{style:{color:C.muted,fontSize:"12px",marginBottom:"12px"}},`✅ ${ok} ok · ⚠️ ${warn} no stats · ❌ ${err} not found`),
      h("button",{style:{padding:"8px 18px",borderRadius:"7px",cursor:"pointer",background:"transparent",border:`1px solid ${C.border}`,color:C.muted,fontSize:"13px"},onClick:runDebug},"⟳ Run Again")
    ));
  }
  return wrap;
}

async function runDebug() {
  set({dbRunning:true,dbDone:false,dbResults:[]});
  const out=[];
  for(const team of S.teams) {
    for(const p of (team.players||[])) {
      if(!p.name?.trim()) continue;
      try {
        let playerId = PLAYER_IDS[p.name] || null;
        let matchedName = p.name;
        if (!playerId) {
          const r = await fetch(`https://statsapi.mlb.com/api/v1/people/search?names=${encodeURIComponent(p.name)}&sportId=1`);
          const d = await r.json();
          const person = d.people?.[0];
          if(!person){ out.push({name:p.name,fantasyTeam:team.name,status:"❌ Not found",detail:"No player matched this name",hr:null,hbp:null,mlbTeam:null}); set({dbResults:[...out]}); continue; }
          playerId = person.id;
          matchedName = person.fullName;
        }
        const season=new Date().getFullYear();
        const r2=await fetch(`https://statsapi.mlb.com/api/v1/people/${playerId}/stats?stats=season&group=hitting&season=${season}&sportId=1`);
        const d2=await r2.json();
        const split=d2.stats?.[0]?.splits?.[0];
        if(!split) out.push({name:p.name,fantasyTeam:team.name,status:"⚠️ No stats yet",detail:`Found as "${matchedName}" but no ${season} stats`,hr:null,hbp:null,mlbTeam:null});
        else out.push({name:p.name,fantasyTeam:team.name,status:"✅ OK",detail:`Matched as "${matchedName}"`,hr:split.stat?.homeRuns??0,hbp:split.stat?.hitByPitch??0,mlbTeam:split.team?.abbreviation??null});
      } catch(e){ out.push({name:p.name,fantasyTeam:team.name,status:"💥 Error",detail:String(e),hr:null,hbp:null,mlbTeam:null}); }
      set({dbResults:[...out]});
    }
  }
  set({dbRunning:false,dbDone:true});
}

// ── Rosters ───────────────────────────────────────────────────────────────────
function buildRosters() {
  const sorted = [...S.teams].sort((a,b)=>score(b)-score(a));

  sorted.forEach((team,ti)=>{
    const totalScore = score(team);

      team.owner?h("div",{style:{color:C.muted,fontSize:"12px",marginTop:"2px"}},team.owner):null

    const tscore = h("div",{style:{textAlign:"right"}},
      h("div",{style:{color:C.accent,fontFamily:"'Bebas Neue', sans-serif",fontSize:"28px",fontWeight:"800",lineHeight:"1"}},totalScore),
      h("div",{style:{color:C.muted,fontSize:"10px",textTransform:"uppercase",letterSpacing:"0.08em"}},"Total Pts")
    );
    thdr.append(tinfo,tscore);
    card.appendChild(thdr);

    // HR players
    hrPlayers.forEach((p,i)=>{
      const pts = p.effectiveHR||0;
      const row = h("div",{class:"row-hover",style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"11px 18px",borderBottom:`1px solid ${C.border}22`,opacity:p.droppedAt?"0.5":"1",background:"transparent",cursor:"pointer"},onClick:()=>openSpotlight(p.name,team.name,p.type)});
      const left = h("div",{style:{display:"flex",flexDirection:"column",gap:"2px"}});
      const nameEl = h("span",{style:{color:C.text,fontSize:"14px",fontWeight:"600"}},p.name);
      if(p.teamAbbr) nameEl.appendChild(h("span",{style:{color:C.muted,fontWeight:"400"}},` (${p.teamAbbr})`));
      left.appendChild(nameEl);
      const tags = h("div",{style:{display:"flex",gap:"6px",alignItems:"center",marginTop:"2px"}});
      tags.appendChild(badge("HR",C.red));
      if(p.droppedAt) tags.appendChild(h("span",{style:{color:C.muted,fontSize:"10px"}},`dropped ${fmtDate(p.droppedAt)}`));
      if(p.addedAt) tags.appendChild(h("span",{style:{color:C.green,fontSize:"10px"}},`added ${fmtDate(p.addedAt)}`));
      left.appendChild(tags);
      const right = h("div",{style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"2px"}});
      right.appendChild(h("span",{style:{color:C.red,fontFamily:"'Bebas Neue', sans-serif",fontSize:"24px",fontWeight:"800",lineHeight:"1"}},pts));
      right.appendChild(h("span",{style:{color:C.muted,fontSize:"10px",textTransform:"uppercase"}},pts===1?"point":"points"));
      row.append(left,right);
      card.appendChild(row);
    });

    // HBP player
    if(hbpPlayer){
      const pts = hbpPlayer.effectiveHBP||0;
      const row = h("div",{class:"row-hover",style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"11px 18px",opacity:hbpPlayer.droppedAt?"0.5":"1",background:`${C.green}08`,borderTop:`1px solid ${C.border}22`,cursor:"pointer"},onClick:()=>openSpotlight(hbpPlayer.name,team.name,hbpPlayer.type)});
      const left = h("div",{style:{display:"flex",flexDirection:"column",gap:"2px"}});
      const nameEl = h("span",{style:{color:C.text,fontSize:"14px",fontWeight:"600"}},hbpPlayer.name);
      if(hbpPlayer.teamAbbr) nameEl.appendChild(h("span",{style:{color:C.muted,fontWeight:"400"}},` (${hbpPlayer.teamAbbr})`));
      left.appendChild(nameEl);
      const tags = h("div",{style:{display:"flex",gap:"6px",alignItems:"center",marginTop:"2px"}});
      tags.appendChild(badge("HBP",C.green));
      if(hbpPlayer.droppedAt) tags.appendChild(h("span",{style:{color:C.muted,fontSize:"10px"}},`dropped ${fmtDate(hbpPlayer.droppedAt)}`));
      if(hbpPlayer.addedAt) tags.appendChild(h("span",{style:{color:C.green,fontSize:"10px"}},`added ${fmtDate(hbpPlayer.addedAt)}`));
      left.appendChild(tags);
      const right = h("div",{style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"2px"}});
      right.appendChild(h("span",{style:{color:C.green,fontFamily:"'Bebas Neue', sans-serif",fontSize:"24px",fontWeight:"800",lineHeight:"1"}},pts));
      right.appendChild(h("span",{style:{color:C.muted,fontSize:"10px",textTransform:"uppercase"}},pts===1?"point":"points"));
      row.append(left,right);
      card.appendChild(row);
    }

    // Team total bar
    const allScores = S.teams.map(t=>score(t));
    const maxScore = Math.max(...allScores,1);
    const pct = (totalScore/maxScore)*100;
    const barWrap = h("div",{style:{padding:"10px 18px",borderTop:`1px solid ${C.border}22`,background:C.surface}});
    const barTrack = h("div",{style:{height:"4px",background:C.bg,borderRadius:"2px",overflow:"hidden"}});
    barTrack.appendChild(h("div",{style:{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${C.accent},${C.red})`,borderRadius:"2px",transition:"width 0.6s ease"}}));
    barWrap.appendChild(barTrack);
    card.appendChild(barWrap);

    wrap.appendChild(card);
  });

  return wrap;
}

// ── Player Spotlight ──────────────────────────────────────────────────────────
async function openSpotlight(playerName, fantasyTeam, type) {
  set({spotlightPlayer:{name:playerName, fantasyTeam, type}, spotlightData:null, spotlightLoading:true});
  const playerId = PLAYER_IDS[playerName];
  if(!playerId) { set({spotlightLoading:false}); return; }
  const season = new Date().getFullYear();
  try {
    const [sr, lr] = await Promise.all([
      fetch(`https://statsapi.mlb.com/api/v1/people/${playerId}/stats?stats=season&group=hitting&season=${season}&sportId=1`),
      fetch(`https://statsapi.mlb.com/api/v1/people/${playerId}/stats?stats=lastXGames&group=hitting&season=${season}&sportId=1&limit=7`)
    ]);
    const [sd, ld] = await Promise.all([sr.json(), lr.json()]);
    const season_split = sd.stats?.[0]?.splits?.[0]?.stat || {};
    const last7_split = ld.stats?.[0]?.splits?.[0]?.stat || {};
    set({spotlightLoading:false, spotlightData:{season:season_split, last7:last7_split, playerId}});
  } catch(e) {
    set({spotlightLoading:false, spotlightData:null});
  }
}

// ── Projected Team Breakdown Modal ────────────────────────────────────────────
function buildProjectedTeamModal() {
  const {team, gamesPlayed, gamesRemaining, paceWeight, projWeight} = S.projectedTeam;
  const TOTAL_GAMES = 162;

  const overlay = h("div",{style:{position:"fixed",inset:"0",background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:"1100",padding:"16px"},onClick:()=>set({projectedTeam:null})});
  const modal = h("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:"16px",padding:"24px",maxWidth:"420px",width:"100%",maxHeight:"88vh",overflowY:"auto"},onClick:e=>e.stopPropagation()});

  // Header
  modal.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"6px"}},
    h("div",{},
      h("div",{style:{color:C.text,fontWeight:"800",fontSize:"18px"}},team.name),
      h("div",{style:{color:C.muted,fontSize:"12px",marginTop:"2px"}},team.owner||"")
    ),
    h("button",{style:{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:"20px",lineHeight:"1"},onClick:()=>set({projectedTeam:null})},"✕")
  ));
  modal.appendChild(h("div",{style:{color:C.muted,fontSize:"11px",marginBottom:"20px"}},
    `${Math.round(projWeight*100)}% preseason · ${Math.round(paceWeight*100)}% pace · ${gamesRemaining} games left`
  ));

  // HR Players
  modal.appendChild(h("div",{style:{color:C.red,fontSize:"11px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:"8px"}},"HR Players"));
  const hrPlayers = (team.players||[]).filter(p=>p.type==="hr");
  const hrList = h("div",{style:{background:C.bg,borderRadius:"10px",overflow:"hidden",marginBottom:"16px"}});

  // Calculate per-player projections
  const playerProj = (p) => {
    const actual = p.type==="hr" ? (p.effectiveHR||0) : (p.effectiveHBP||0);
    const preseason = PRESEASON_PROJ[p.name] ?? null;
    let projFinal;
    if(preseason === null) {
      const rate = actual / Math.max(gamesPlayed, 1);
      projFinal = actual + rate * gamesRemaining;
    } else {
      const paceRate = actual / Math.max(gamesPlayed, 1);
      const paceRemaining = paceRate * gamesRemaining;
      const preseasonRemaining = (preseason / TOTAL_GAMES) * gamesRemaining;
      projFinal = actual + (paceWeight * paceRemaining) + (projWeight * preseasonRemaining);
    }
    return { actual, preseason, projFinal: Math.round(projFinal) };
  };

  hrPlayers.forEach((p,i) => {
    const {actual, preseason, projFinal} = playerProj(p);
    const row = h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",borderBottom:i<hrPlayers.length-1?`1px solid ${C.border}22`:"none",cursor:"pointer"},onClick:()=>openSpotlight(p.name,team.name,p.type)});
    row.classList.add("row-hover");
    const left = h("div",{});
    const nameEl = h("span",{style:{color:p.droppedAt?C.muted:C.text,fontWeight:"600",fontSize:"14px"}},p.name);
    if(p.teamAbbr) nameEl.appendChild(h("span",{style:{color:C.muted,fontWeight:"400",fontSize:"12px"}},` (${p.teamAbbr})`));
    left.appendChild(nameEl);
    left.appendChild(h("div",{style:{color:C.muted,fontSize:"11px",marginTop:"2px"}},
      preseason !== null ? `${actual} actual · ${preseason} preseason proj` : `${actual} actual · no preseason data`
    ));
    const right = h("div",{style:{textAlign:"right"}});
    right.appendChild(h("div",{style:{color:C.red,fontFamily:"'Bebas Neue', sans-serif",fontSize:"22px",fontWeight:"800",lineHeight:"1"}},projFinal));
    right.appendChild(h("div",{style:{color:C.muted,fontSize:"10px",textTransform:"uppercase"}},"proj HR"));
    row.append(left, right);
    hrList.appendChild(row);
  });
  modal.appendChild(hrList);

  // HBP Player
  const hbpPlayers = (team.players||[]).filter(p=>p.type==="hbp");
  if(hbpPlayers.length > 0) {
    modal.appendChild(h("div",{style:{color:C.green,fontSize:"11px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:"8px"}},"HBP Player"));
    const hbpList = h("div",{style:{background:C.bg,borderRadius:"10px",overflow:"hidden",marginBottom:"16px"}});
    hbpPlayers.forEach((p,i) => {
      const {actual, preseason, projFinal} = playerProj(p);
      const row = h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",cursor:"pointer"},onClick:()=>openSpotlight(p.name,team.name,p.type)});
      row.classList.add("row-hover");
      const left = h("div",{});
      const nameEl = h("span",{style:{color:p.droppedAt?C.muted:C.text,fontWeight:"600",fontSize:"14px"}},p.name);
      if(p.teamAbbr) nameEl.appendChild(h("span",{style:{color:C.muted,fontWeight:"400",fontSize:"12px"}},` (${p.teamAbbr})`));
      left.appendChild(nameEl);
      left.appendChild(h("div",{style:{color:C.muted,fontSize:"11px",marginTop:"2px"}},
        preseason !== null ? `${actual} actual · ${preseason} preseason proj` : `${actual} actual · no preseason data`
      ));
      const right = h("div",{style:{textAlign:"right"}});
      right.appendChild(h("div",{style:{color:C.green,fontFamily:"'Bebas Neue', sans-serif",fontSize:"22px",fontWeight:"800",lineHeight:"1"}},projFinal));
      right.appendChild(h("div",{style:{color:C.muted,fontSize:"10px",textTransform:"uppercase"}},"proj HBP"));
      row.append(left, right);
      hbpList.appendChild(row);
    });
    modal.appendChild(hbpList);
  }

  // Team total
  const totalProj = [...hrPlayers,...hbpPlayers].reduce((s,p)=>s+playerProj(p).projFinal,0);
  modal.appendChild(h("div",{style:{background:`${C.accent}11`,border:`1px solid ${C.accent}33`,borderRadius:"10px",padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}},
    h("span",{style:{color:C.muted,fontSize:"12px",fontWeight:"600"}},"Projected Team Total"),
    h("span",{style:{color:C.accent,fontFamily:"'Bebas Neue', sans-serif",fontSize:"26px",fontWeight:"800"}},totalProj)
  ));

  modal.appendChild(h("button",{style:{width:"100%",padding:"10px",background:"transparent",border:`1px solid ${C.border}`,borderRadius:"8px",color:C.muted,cursor:"pointer",fontSize:"14px"},onClick:()=>set({projectedTeam:null})},"Close"));
  overlay.appendChild(modal);
  return overlay;
}

    set({cpLocal:updated,cpRefreshing:false,cpStatus:"✓ Stats updated!"});
    setTimeout(()=>set({cpStatus:""}),3000);
  }},S.cpRefreshing?"⟳ Refreshing…":"⟳ Refresh Live Stats"));
  actions.appendChild(h("button",{style:{padding:"10px 18px",borderRadius:"8px",cursor:"pointer",fontWeight:"700",fontSize:"13px",background:C.accent,border:"none",color:"#000"},onClick:async()=>{await saveToFirebase(local);set({cpStatus:"✓ Saved!"});setTimeout(()=>set({cpStatus:""}),2000);}},  "💾 Save"));
  panel.appendChild(actions);
  overlay.appendChild(panel);
  return overlay;
}

// ── Main render ───────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  app.innerHTML="";

  // Header
  const header=h("div",{style:{background:`linear-gradient(135deg,${C.surface} 0%,#0d1729 100%)`,borderBottom:`1px solid ${C.border}`,padding:"20px 20px 16px"}});
  const hInner=h("div",{style:{maxWidth:"640px",margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:"12px"}});
  const titleBlock=h("div",{},
    h("div",{style:{fontFamily:"'Bebas Neue', sans-serif",fontSize:"38px",letterSpacing:"0.05em",color:C.accent,lineHeight:"1"}},"⚾ DINGERS ONLY"),
    h("div",{style:{color:C.muted,fontSize:"13px",letterSpacing:"0.15em",textTransform:"uppercase",marginTop:"2px"}},"Fantasy Baseball · 2026"),
    h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginTop:"10px"}},
      h("button",{style:{padding:"6px 14px",borderRadius:"6px",cursor:"pointer",fontWeight:"700",fontSize:"12px",background:`${C.accent}22`,border:`1px solid ${C.accent}55`,color:C.accent,opacity:S.refreshing?"0.6":"1"},onClick:refreshAllStats},S.refreshing?"⟳ Refreshing…":"⟳ Refresh Stats"),
      S.refreshStatus?h("span",{style:{color:C.green,fontSize:"12px"}},S.refreshStatus):S.lastUpdated?h("span",{style:{color:C.muted,fontSize:"11px"}},`Updated ${fmtTime(S.lastUpdated)}`):null
    )
  );
  const authBlock=h("div",{style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"6px"}});
  if(!S.commishUnlocked){
    const pwRow=h("div",{style:{display:"flex",gap:"6px",alignItems:"center"}});
    const pwInp=h("input",{type:"password",placeholder:"Commissioner PIN",style:{background:C.bg,border:`1px solid ${S.pwError?C.red:C.border}`,borderRadius:"6px",padding:"7px 10px",color:C.text,fontSize:"13px",outline:"none",width:"155px"}});
    pwInp.value=S.commishInput;
    pwInp.addEventListener("input",e=>set({commishInput:e.target.value,pwError:false}));
    pwInp.addEventListener("keydown",e=>{if(e.key==="Enter")handleLogin();});
    pwRow.append(pwInp,h("button",{style:{padding:"7px 12px",borderRadius:"6px",cursor:"pointer",background:C.accent,border:"none",color:"#000",fontWeight:"700",fontSize:"13px"},onClick:handleLogin},"Enter"));
    authBlock.appendChild(pwRow);
    if(S.pwError) authBlock.appendChild(h("span",{style:{color:C.red,fontSize:"12px"}},"Incorrect password"));
  } else {
    authBlock.appendChild(h("button",{style:{padding:"7px 14px",borderRadius:"6px",cursor:"pointer",background:C.accent,border:"none",color:"#000",fontWeight:"700",fontSize:"13px"},onClick:()=>{set({showCommish:true,cpLocal:JSON.parse(JSON.stringify(S.teams)),cpActive:0});}},"⚙️ Manage League"));
  }
  hInner.append(titleBlock,authBlock);
  header.appendChild(hInner);
  app.appendChild(header);

  // Tabs
  const tabs=[{id:"standings",label:"🏆 Standings"},{id:"rosters",label:"📋 Rosters"},{id:"leaderboard",label:"📊 Leaderboard"},{id:"projected",label:"🔮 Projected"},{id:"hot",label:"🔥 Hot"},{id:"scores",label:"⚾ Scores"},{id:"recent",label:"📅 Recent"},{id:"history",label:"📈 History"},{id:"rules",label:"📖 Rules"},...(S.commishUnlocked?[{id:"debug",label:"🔍 Debug"}]:[])];
  const tabBar=h("div",{style:{borderBottom:`1px solid ${C.border}`,background:C.surface}});
  const tabInner=h("div",{style:{maxWidth:"640px",margin:"0 auto",display:"flex",padding:"0 16px",overflowX:"auto"}});
  tabs.forEach(tab=>{
    const active=S.tab===tab.id;
    tabInner.appendChild(h("button",{class:"tab-btn",style:{padding:"13px 16px",background:"none",border:"none",borderBottom:active?`2px solid ${C.accent}`:"2px solid transparent",color:active?C.accent:C.muted,fontWeight:active?"700":"500",fontSize:"13px",cursor:"pointer",whiteSpace:"nowrap"},onClick:()=>set({tab:tab.id})},tab.label));
  });
  tabBar.appendChild(tabInner);
  app.appendChild(tabBar);

  // Body
  const body=h("div",{style:{maxWidth:"640px",margin:"0 auto",padding:"24px 16px"}});
  if(S.tab==="standings") body.appendChild(buildStandings());
  else if(S.tab==="rosters") body.appendChild(buildRosters());
  else if(S.tab==="leaderboard") body.appendChild(buildLeaderboard());
  else if(S.tab==="projected") body.appendChild(buildProjected());
  else if(S.tab==="hot") body.appendChild(buildHot());
  else if(S.tab==="scores") body.appendChild(buildScores());
  else if(S.tab==="recent") body.appendChild(buildRecent());
  else if(S.tab==="history") body.appendChild(buildHistory());
  else if(S.tab==="rules") body.appendChild(buildRules());
  else if(S.tab==="debug") body.appendChild(buildDebug());
  app.appendChild(body);

  if(S.selectedTeam) app.appendChild(buildTeamModal(S.selectedTeam));
  if(S.spotlightPlayer) app.appendChild(buildSpotlightModal());
  if(S.projectedTeam) app.appendChild(buildProjectedTeamModal());
  if(S.showCommish&&S.cpLocal) app.appendChild(buildCommish());
}

function handleLogin() {
  if(S.commishInput===PASS){ set({commishUnlocked:true,showCommish:true,pwError:false,cpLocal:JSON.parse(JSON.stringify(S.teams)),cpActive:0}); }
  else set({pwError:true});
}

render();
setInterval(() => { if(S.tab === "rules") render(); }, 1000);
</script>
</body>
</html>
